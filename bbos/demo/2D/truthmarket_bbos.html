<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Barakah Business Operating System</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Space+Grotesk:wght@500;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f11;--bg2:#13161a;--bg3:#1c2026;--bg4:#232830;
  --border:#ffffff12;--border2:#ffffff1f;
  --text:#e8e3dc;--text2:#9e9690;--text3:#7a7470;
  --accent:#c9a05a;--accent2:#a07a38;--accent-bg:#c9a05a15;
  --qal:#d4974a;--qal-bg:#d4974a15;--qal-b:#d4974a40;
  --str:#5b9bd5;--str-bg:#5b9bd515;--str-b:#5b9bd540;
  --ofr:#9b7dd4;--ofr-bg:#9b7dd415;--ofr-b:#9b7dd440;
  --out:#5ab87a;--out-bg:#5ab87a15;--out-b:#5ab87a40;
  --sal:#d47560;--sal-bg:#d4756015;--sal-b:#d4756040;
  --ful:#4ab8a8;--ful-bg:#4ab8a815;--ful-b:#4ab8a840;
  --int:#b8a96a;--int-bg:#b8a96a15;--int-b:#b8a96a40;
  --ret:#d4a55a;--ret-bg:#d4a55a15;--ret-b:#d4a55a40;
  --opt:#7b6fa0;--opt-bg:#7b6fa015;--opt-b:#7b6fa040;
  --dlr:#4a9db8;--dlr-bg:#4a9db815;--dlr-b:#4a9db840;
  --success:#4ade80;--success-bg:rgba(74,222,128,.12);--success-b:rgba(74,222,128,.25);--success-b2:rgba(74,222,128,.4);
  --warning:#f59e0b;--warning-bg:rgba(245,158,11,.1);--warning-b:rgba(245,158,11,.25);--warning-bg2:rgba(245,158,11,.15);--warning-b2:rgba(245,158,11,.35);
  --danger:#ef4444;--danger-bg:rgba(239,68,68,.08);--danger-b:rgba(239,68,68,.2);
  --on-accent:#fff;
  --overlay:rgba(0,0,0,.65);--shadow:0 8px 32px rgba(0,0,0,.4);--shadow-lg:0 12px 48px rgba(0,0,0,.4);
  --drag-hover:rgba(99,102,241,.25);--btn-border-inactive:rgba(255,255,255,.25);--wbtn-hover:#d4a84e;
  --draft-bg:rgba(245,158,11,.08);--draft-border:rgba(245,158,11,.25);
}
[data-theme="light"]{
  --bg:#f5f3f0;--bg2:#edeae6;--bg3:#e4e1dc;--bg4:#d9d5cf;
  --border:#00000015;--border2:#00000022;
  --text:#1a1816;--text2:#5a554f;--text3:#8a847e;
  --accent:#8a6d2e;--accent2:#6b5522;--accent-bg:#c9a05a20;
  --qal:#b07a2e;--qal-bg:#d4974a20;--qal-b:#d4974a50;
  --str:#3a78b0;--str-bg:#5b9bd520;--str-b:#5b9bd550;
  --ofr:#7a5cb5;--ofr-bg:#9b7dd420;--ofr-b:#9b7dd450;
  --out:#3a8a58;--out-bg:#5ab87a20;--out-b:#5ab87a50;
  --sal:#b05540;--sal-bg:#d4756020;--sal-b:#d4756050;
  --ful:#2e8a7a;--ful-bg:#4ab8a820;--ful-b:#4ab8a850;
  --int:#8a7d40;--int-bg:#b8a96a20;--int-b:#b8a96a50;
  --ret:#b0803a;--ret-bg:#d4a55a20;--ret-b:#d4a55a50;
  --opt:#5a5080;--opt-bg:#7b6fa020;--opt-b:#7b6fa050;
  --dlr:#2e7a90;--dlr-bg:#4a9db820;--dlr-b:#4a9db850;
  --success:#16a34a;--success-bg:rgba(22,163,74,.1);--success-b:rgba(22,163,74,.3);--success-b2:rgba(22,163,74,.45);
  --warning:#d97706;--warning-bg:rgba(217,119,6,.1);--warning-b:rgba(217,119,6,.3);--warning-bg2:rgba(217,119,6,.15);--warning-b2:rgba(217,119,6,.4);
  --danger:#dc2626;--danger-bg:rgba(220,38,38,.08);--danger-b:rgba(220,38,38,.25);
  --on-accent:#fff;
  --overlay:rgba(0,0,0,.45);--shadow:0 8px 32px rgba(0,0,0,.15);--shadow-lg:0 12px 48px rgba(0,0,0,.15);
  --drag-hover:rgba(99,102,241,.15);--btn-border-inactive:rgba(0,0,0,.2);--wbtn-hover:#b8923e;
  --draft-bg:rgba(217,119,6,.08);--draft-border:rgba(217,119,6,.25);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:18px;line-height:1.6;overflow:hidden}
.app{display:grid;grid-template-columns:248px 28px 1fr;grid-template-rows:52px 1fr;height:100vh;transition:grid-template-columns .22s ease}
/* topbar */
.tb{grid-column:1/-1;display:flex;align-items:center;padding:0 18px;border-bottom:1px solid var(--border);background:var(--bg2);gap:10px;z-index:10;position:relative;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.tb::-webkit-scrollbar{height:2px}.tb::-webkit-scrollbar-thumb{background:var(--bg4)}
/* mobile breakpoint handled at line 342+ */
.tb-logo{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tb-mark{width:30px;height:30px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--bg);line-height:1}
.tb-mark svg{width:12px;height:12px;fill:var(--bg)}
.tb-name{font-size:18px;font-weight:500;color:var(--text);letter-spacing:.01em}
.tb-sep{color:var(--text3);font-size:15px;margin:0 1px}
.tb-sub{font-size:12px;color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.tb-divider{width:1px;height:20px;background:var(--border2);flex-shrink:0;margin:0 2px}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0}
/* role selector */
.role-sel-wrap{display:flex;align-items:center;gap:5px;position:relative;z-index:10}
.role-sel-lbl{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;flex-shrink:0}
.role-sel{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px;gap:1px}
.rs-btn{padding:3px 10px;border-radius:4px;border:none;background:transparent;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .12s;white-space:nowrap;letter-spacing:.2px}
.rs-btn.on{color:var(--text)}
.rs-btn:not(.on){color:var(--text3)}
.rs-btn:hover:not(.on){color:var(--text2)}
@keyframes role-flash{0%,100%{opacity:.3}50%{opacity:1}}
.role-toggle-icon{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;line-height:1;flex-shrink:0}
.role-toggle-icon.flash{animation:role-flash 1.5s ease-in-out infinite;color:var(--text3)}
.role-toggle-icon.static{color:var(--text3);opacity:.6}
.role-toggle-icon.closed{color:var(--text3);opacity:.25}
.role-toggle-icon:hover{opacity:1!important;color:var(--text)}
/* view seg */
.seg{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px;gap:1px}
.sg-btn{padding:3px 10px;border-radius:4px;border:none;background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .12s;letter-spacing:.2px}
.sg-btn.on{background:var(--bg4);color:var(--text)}
.sg-btn:hover:not(.on){color:var(--text2)}
.tb-badge{font-size:12px;padding:3px 9px;border-radius:20px;font-weight:500;flex-shrink:0}
/* sidebar */
.sb{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;position:relative;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.sb-drag{display:none}
.sb::-webkit-scrollbar{width:3px}.sb::-webkit-scrollbar-thumb{background:var(--bg4)}
/* ── ISLAMIC LAYER COLUMN ── */
.il{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;position:relative;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.il::-webkit-scrollbar{width:3px}.il::-webkit-scrollbar-thumb{background:var(--bg4)}
.il-hdr{padding:8px 12px 7px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;background:var(--bg2)}
.il-eyebrow{font-size:9px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent);opacity:.75;margin-bottom:2px}
.il-stage{font-size:12px;color:var(--text3);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.il-empty{padding:22px 14px;color:var(--text3);font-size:12px;line-height:1.75;text-align:center}
.il-empty-glyph{font-size:18px;color:var(--accent);opacity:.4;margin-bottom:10px}
.il-section-divider{height:1px;background:var(--border);margin:2px 0}
.il-drag{display:none}
@keyframes il-fade-in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.il-content{animation:il-fade-in .18s ease-out}
/* Dense overrides for IL column — narrower container needs tighter spacing */
.il .dua-toggle{padding:6px 10px}
.il .dua-body{padding:2px 10px 10px}
.il .dua-arabic{font-size:16px;line-height:1.8}
.il .dua-trans,.il .dua-meaning{font-size:13px}
.il .dua-source{font-size:12px}
.il .dua-kind{font-size:11px;letter-spacing:.6px}
.il .dua-title-txt{font-size:12px}
.il .dua-ann-text{font-size:13px}
.il .sb-attr-toggle,.il .sb-readiness-toggle,.il .sb-reflect-toggle{padding:6px 10px}
.il .sb-attr-body,.il .sb-rr-body{padding:0 8px 10px}
.il .sb-attr-card-text,.il .sb-rr-item,.il .sb-rr-frame{font-size:13px}
.il .sb-rr-table{grid-template-columns:1fr}
.il .sb-attr-kind,.il .sb-rr-kind{font-size:11px}
.il .sb-attr-names,.il .sb-rr-sub{font-size:11px}
/* Column collapse toggle — exact same pattern as .role-toggle-icon in topbar */
/* Sidebar edge toggle — grid column between sidebar and main */
.sb-edge-toggle{grid-row:2;grid-column:2;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);padding:0;cursor:pointer;transition:background .15s;user-select:none;min-width:0}
.sb-edge-toggle:hover{background:var(--bg4)}
.sb-edge-toggle::after{content:'';display:block;width:3px;height:40px;border-radius:2px;background:var(--border2);transition:background .15s}
.sb-edge-toggle:hover::after{background:var(--accent)}
.il-edge-toggle{grid-row:2;grid-column:4;display:flex;align-items:center;justify-content:center;background:var(--bg3);border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);padding:0;cursor:pointer;transition:background .15s;user-select:none;min-width:0}
.il-edge-toggle:hover{background:var(--bg4)}
.il-edge-toggle::after{content:'';display:block;width:3px;height:40px;border-radius:2px;background:var(--border2);transition:background .15s}
.il-edge-toggle:hover::after{background:var(--accent)}
/* flash-btn: vstrip icon button that pulses when unlocked (column closed, inviting hover) */
.flash-btn{animation:role-flash 1.5s ease-in-out infinite}
/* Vertical collapsed strips */
.il-vstrip,.sb-vstrip{display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:3px;width:40px;overflow:hidden;flex-shrink:0}
.vstrip-icon-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0;border-radius:6px;border:none;background:transparent;cursor:pointer;width:36px;transition:background .12s;color:var(--text3)}
.vstrip-icon-btn:hover{background:var(--bg3);color:var(--text)}
.vstrip-code{font-size:9px;font-weight:700;letter-spacing:.5px;color:inherit}
.vstrip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.vstrip-divider{width:18px;height:1px;background:var(--border);margin:2px 0}
/* ── THRESHOLD MODALS ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.thr-overlay{position:fixed;inset:0;z-index:9000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);animation:fadeIn .3s ease}
.thr-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:min(640px,92vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 80px rgba(0,0,0,.55),0 0 0 1px rgba(201,168,76,.08)}
.thr-hdr{padding:20px 24px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.thr-eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.thr-title{font-size:17px;font-weight:600;color:var(--text);font-family:'Space Grotesk',sans-serif}
.thr-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:4px 8px;line-height:1;flex-shrink:0}
.thr-close:hover{color:var(--text)}
.thr-step-bar{display:flex;justify-content:center;gap:8px;margin:12px 0 4px}
.thr-step-dot{height:8px;border-radius:4px;transition:all .38s ease}
.thr-step-lbl{text-align:center;font-size:11px;color:var(--text3);letter-spacing:.06em}
.thr-body{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent;transition:opacity .28s ease,transform .28s ease}
.thr-body::-webkit-scrollbar{width:4px}.thr-body::-webkit-scrollbar-thumb{background:var(--bg4)}
.thr-ftr{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:10px}
.thr-dua{background:linear-gradient(135deg,var(--accent-bg),transparent);border:1px solid rgba(201,168,76,.18);border-radius:12px;padding:28px 22px;text-align:center}
.thr-dua-eyebrow{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.thr-dua-attr{font-size:12px;color:var(--text3);margin-bottom:20px}
.thr-arabic{font-family:'Amiri','Traditional Arabic',serif;font-size:26px;line-height:1.8;direction:rtl;color:var(--text);margin-bottom:14px;padding:0 8px}
.thr-transliteration{font-size:13px;color:var(--text2);font-style:italic;line-height:1.6;margin-bottom:10px}
.thr-translation{font-size:15px;color:var(--text);line-height:1.65;font-style:italic;margin-bottom:12px;padding:0 12px}
.thr-source{font-size:11px;color:var(--text3);margin-top:4px}
.thr-readiness-note{text-align:center;font-style:italic;font-size:13px;color:var(--text3);margin-top:20px;line-height:1.6}
.thr-attr-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:11px}
.thr-attr-glyph{font-size:12px;color:var(--accent);margin-bottom:4px}
.thr-attr-name{font-size:16px;font-weight:600;color:var(--text);margin-bottom:3px}
.thr-attr-title{font-size:12px;color:var(--text3);font-style:italic;margin-bottom:12px}
.thr-attr-body{font-size:13px;color:var(--text2);line-height:1.75}
.thr-frame{font-size:13px;font-style:italic;color:var(--text2);line-height:1.7;margin-bottom:18px;padding:14px 16px;background:var(--accent-bg);border-radius:7px;border-left:2px solid var(--accent2)}
.thr-signs{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;font-size:13px;line-height:1.65}
.thr-signs-th-l{background:var(--success-bg);color:var(--success);padding:11px 14px;text-align:left;font-weight:500;font-size:11px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);width:50%}
.thr-signs-th-r{background:var(--danger-bg);color:var(--danger);padding:11px 14px;text-align:left;font-weight:500;font-size:11px;border-bottom:1px solid var(--border);width:50%}
.thr-signs-td-l{padding:11px 13px;color:var(--text2);border-right:1px solid var(--border);vertical-align:top;border-bottom:1px solid var(--border)}
.thr-signs-td-r{padding:11px 13px;color:var(--text2);vertical-align:top;border-bottom:1px solid var(--border)}
.thr-signs-tr-last td{border-bottom:none}
.thr-declaration{margin-top:22px;padding:18px;background:var(--bg3);border-radius:8px;border:1px solid var(--border)}
.thr-decl-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px}
.thr-decl-note{font-size:12px;font-style:italic;color:var(--text3);line-height:1.6;margin-bottom:16px}
.thr-check{display:flex;gap:12px;align-items:flex-start;padding:13px 14px;border:1px solid var(--border);border-radius:7px;cursor:pointer;margin-bottom:9px;transition:all .2s;user-select:none}
.thr-check.on{background:var(--accent-bg);border-color:rgba(201,168,76,.28)}
.thr-check-box{width:19px;height:19px;min-width:19px;border-radius:4px;border:2px solid var(--border2);background:transparent;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:1px;flex-shrink:0}
.thr-check-box.on{background:var(--accent);border-color:var(--accent)}
.thr-check-lbl{font-size:13px;color:var(--text2);line-height:1.6;transition:color .2s}
.thr-check.on .thr-check-lbl{color:var(--text)}
.thr-decl-footer{font-size:11px;font-style:italic;color:var(--text3);line-height:1.6;margin-top:6px}
.thr-btn{padding:11px 22px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;letter-spacing:.02em}
.thr-btn-primary{background:var(--accent);color:var(--bg);border:none}
.thr-btn-primary:hover:not(:disabled){background:var(--wbtn-hover)}
.thr-btn-primary:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed;opacity:.55}
.thr-btn-ghost{background:transparent;color:var(--text3);border:1px solid var(--border2)}
.thr-btn-ghost:hover{color:var(--text2)}
.thr-notes{width:100%;min-height:76px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:10px 12px;color:var(--text);font-size:13px;line-height:1.6;resize:vertical;outline:none;font-family:inherit;box-sizing:border-box;margin-top:8px}
.thr-notes:focus{border-color:var(--accent2)}
.thr-notes::placeholder{color:var(--text3)}
/* Stage threshold buttons in Col 2 header */
.stg-thr-btn{font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.4px;transition:all .12s;white-space:nowrap;flex-shrink:0}
.stg-begin{background:transparent;border:1px solid var(--border2);color:var(--text3)}
.stg-begin:hover{color:var(--text);border-color:var(--text3)}
.stg-opened{background:var(--success-bg);border:1px solid var(--success-b);color:var(--success);cursor:default}
.stg-close{background:transparent;border:1px solid var(--border2);color:var(--text3)}
.stg-close:hover{color:var(--text);border-color:var(--text3)}
.stg-closed{background:var(--bg4);border:1px solid var(--border);color:var(--text3);cursor:default}
.tool-locked{opacity:.5;pointer-events:none}
/* Depth-of-field reference mode */
.ref-mode-blur{filter:blur(1.5px);opacity:.35;pointer-events:none;transition:filter .25s,opacity .25s}
.ref-banner{background:var(--danger-bg);border:1px solid var(--danger-b);border-radius:8px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.ref-badge{font-size:9px;letter-spacing:.6px;border:1px solid var(--danger-b);padding:1px 5px;border-radius:3px;color:var(--danger)}
.ref-tool{padding:10px 12px;border-radius:7px;border:1px solid var(--border);background:var(--bg3);margin-bottom:7px}
.ref-tool-done{border-color:rgba(74,222,128,.14);background:rgba(74,222,128,.04)}
.ref-tool-name{font-size:12px;font-weight:500;color:var(--text)}
.ref-tool-text{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.6;white-space:pre-wrap}
.dep-disclosure{margin-top:8px;padding:9px 11px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:6px}
.dep-item{font-size:11px;color:var(--text3);padding:2px 0;display:flex;align-items:center;gap:5px}
.role-banner{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px}
.role-avatar{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.role-banner-info{flex:1;min-width:0}
.role-banner-name{font-size:15px;font-weight:500;color:var(--text);line-height:1.2}
.role-banner-sub{font-size:12px;color:var(--text3)}
.sb-top{padding:8px 14px;position:sticky;top:0;z-index:5;background:var(--bg2);transition:box-shadow .3s}
.sb-top.scrolled{box-shadow:0 4px 12px rgba(0,0,0,.35)}
.sb-top.scrolled::after{content:'';position:absolute;bottom:-8px;left:0;right:0;height:8px;background:linear-gradient(to bottom,rgba(201,160,90,.25),transparent);pointer-events:none;z-index:4}
/* Bottom scroll indicator — fixed position, outside scroll container */
.sb-bottom-fade{display:none;position:fixed;bottom:0;left:0;height:32px;pointer-events:none;z-index:8;background:linear-gradient(to top,rgba(201,160,90,.25) 0%,rgba(201,160,90,.08) 40%,transparent 100%)}
.sb-bottom-fade.active{display:block}
.sb-overview{display:flex;align-items:center;gap:8px;padding:6px 9px;border-radius:5px;border:none;background:transparent;cursor:pointer;color:var(--text2);font-size:15px;font-family:'DM Sans',sans-serif;width:100%;transition:all .12s}
.sb-overview:hover,.sb-overview.on{background:var(--accent-bg);color:var(--accent)}
.sb-overview svg{width:12px;height:12px;flex-shrink:0}
.sb-sec{border-bottom:1px solid var(--border)}
.sb-sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 14px 6px;cursor:pointer;user-select:none}
.sb-sec-hdr:hover{background:var(--bg3)}
.sb-sec-code{font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.sb-sec-attr{font-size:12px;color:var(--text3);font-style:italic;margin-top:1px}
.sb-sec-right{display:flex;align-items:center;gap:5px}
.sb-cnt{font-size:12px;padding:1px 6px;border-radius:10px;font-weight:500}
.sb-chev{font-size:12px;color:var(--text3);transition:transform .15s}
.sb-chev.open{transform:rotate(0)}.sb-chev.closed{transform:rotate(-90deg)}
.sb-item{display:flex;align-items:center;padding:5px 14px 5px 12px;cursor:pointer;gap:8px;border-left:2px solid transparent;transition:all .12s}
.sb-item:hover{background:var(--bg3)}
.sb-item.on{background:var(--accent-bg);border-left-color:var(--accent)}
.sb-item-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-item-body{flex:1;min-width:0}
.sb-item-label{font-size:14px;color:var(--text2);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item.on .sb-item-label{color:var(--text)}
.sb-item-sub{font-size:14px;color:var(--text2)}
.perm-pill{font-size:12px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0}
/* main */
.main{overflow-y:auto;background:var(--bg);scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.main::-webkit-scrollbar{width:4px}.main::-webkit-scrollbar-thumb{background:var(--bg4)}
/* role dashboard */
.dash{padding:24px 28px}
.dash-hdr{margin-bottom:22px}
.dash-role-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.dash-avatar{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;flex-shrink:0}
.dash-role-name{font-family:'Space Grotesk',sans-serif;font-size:30px;color:var(--text);line-height:1.2}
.dash-role-scope{font-size:16px;color:var(--text2);line-height:1.6;max-width:520px}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px 14px}
.stat-num{font-size:28px;font-weight:500;margin-bottom:2px}
.stat-lbl{font-size:14px;color:var(--text3)}
.dash-section{margin-bottom:22px}
.dash-sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.dash-sec-lbl{font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.dash-sec-line{flex:1;height:1px;background:var(--border)}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;cursor:pointer;transition:all .14s}
.dash-card:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-1px)}
.dash-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:6px}
.dash-card-name{font-size:15px;font-weight:500;color:var(--text);line-height:1.3}
.dash-card-asset{font-size:12px;color:var(--text3);line-height:1.3}
.dash-card-stage{font-size:11px;padding:2px 6px;border-radius:3px;font-weight:600;flex-shrink:0;letter-spacing:.3px}
.ref-card{opacity:.7}
.ref-card:hover{opacity:1}
/* overview */
.ov{padding:24px 28px}
.ov-ey{font-size:14px;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent);font-weight:500;margin-bottom:6px}
.ov-title{font-family:'Space Grotesk',sans-serif;font-size:32px;color:var(--text);line-height:1.2;margin-bottom:8px}
.ov-sub{font-size:16px;color:var(--text2);line-height:1.7;max-width:520px;margin-bottom:24px}
.pip{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:26px}
.pip-item{flex:1;min-width:84px;padding:11px 12px;border-radius:5px;border:1px solid;display:flex;flex-direction:column}
.pip-code{font-size:12px;font-weight:600;letter-spacing:.8px;margin-bottom:3px;opacity:.7}
.pip-name{font-size:14px;font-weight:500;margin-bottom:2px}
.pip-cnt{font-size:12px;opacity:.5;margin-bottom:2px}
.pip-attr{font-size:12px;opacity:.4;line-height:1.3}
.sec-div{display:flex;align-items:center;gap:9px;margin-bottom:11px}
.sec-div-lbl{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:500;white-space:nowrap}
.sec-div-line{flex:1;height:1px;background:var(--border)}
.sec-div-cnt{font-size:12px;color:var(--text3);white-space:nowrap}
.tc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(192px,1fr));gap:8px;margin-bottom:22px}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;cursor:pointer;transition:all .14s}
.tc:hover{background:var(--bg3);border-color:var(--border2);transform:translateY(-1px)}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:6px}
.tc-name{font-size:15px;font-weight:500;color:var(--text);line-height:1.3}
.tc-asset{font-size:14px;color:var(--text3)}
/* detail */
.det{padding:24px 28px;max-width:740px}
.bc{display:flex;align-items:center;gap:5px;margin-bottom:16px;font-size:14px;color:var(--text3)}
.bc-btn{background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text3);padding:0}
.bc-btn:hover{color:var(--text2)}
.perm-banner{display:flex;align-items:center;gap:8px;padding:8px 13px;border-radius:6px;margin-bottom:16px;border:1px solid}
.perm-banner-pill{font-size:14px;font-weight:700;padding:3px 10px;border-radius:4px}
.perm-banner-desc{font-size:15px;line-height:1.5}
.det-ey{font-size:12px;text-transform:uppercase;letter-spacing:1px;font-weight:500;margin-bottom:6px}
.det-title{font-family:'Space Grotesk',sans-serif;font-size:30px;color:var(--text);line-height:1.25;margin-bottom:12px}
.det-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.bgo{font-size:14px;padding:3px 9px;border-radius:4px;border:1px solid var(--border2);color:var(--text2);background:transparent}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.det-blk{border-radius:9px;padding:13px 15px}
.det-blk-lbl{font-size:14px;text-transform:uppercase;letter-spacing:.8px;font-weight:500;margin-bottom:4px;opacity:.7}
.det-blk-val{font-size:15px;line-height:1.5}
.det-desc{font-size:15px;color:var(--text2);line-height:1.7;margin:16px 0 20px;max-width:720px}
.det-rat{border-top:1px solid var(--border);padding-top:16px;margin-bottom:22px}
.det-rat-lbl{font-size:14px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500;margin-bottom:8px}
.det-rat-txt{font-size:16px;color:var(--text2);line-height:1.8}
.det-src{border-top:1px solid var(--border);padding-top:16px;margin-bottom:22px}
.det-src-lbl{font-size:14px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500;margin-bottom:10px}
.det-src-list{display:flex;flex-wrap:wrap;gap:8px}
.det-src-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:500;transition:all .12s}
.det-src-stage{font-weight:700;letter-spacing:.5px;font-size:11px;text-transform:uppercase}
.det-src-arrow{opacity:.5;font-size:12px}
.det-src-label{font-size:13px;font-weight:500}
.ws-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:16px 18px}
.ws-lbl{font-size:14px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500;margin-bottom:12px}
/* Source reference panel */
.src-panel{margin-bottom:14px;border:1px solid var(--border);border-radius:6px;background:var(--bg2);overflow:hidden;position:sticky;top:0;z-index:5;max-height:40vh;overflow-y:auto}
.src-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;user-select:none}
.src-header:hover{background:var(--bg3)}
.src-lbl{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);font-weight:500}
.src-toggle{font-size:11px;color:var(--text3)}
.src-body{padding:0 12px 10px}
.src-item{padding:8px 10px;margin-bottom:6px;background:var(--bg3);border-radius:5px;border-left:3px solid var(--accent2)}
.src-item-lbl{font-size:12px;color:var(--accent);font-weight:500;margin-bottom:3px}
.src-item-content{font-size:14px;color:var(--text2);line-height:1.5;white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word}
.src-item-empty{font-size:13px;color:var(--sal);font-style:italic}
/* workspace */
.tabs{display:flex;gap:1px;border-bottom:1px solid var(--border);margin-bottom:13px}
.tab{padding:6px 13px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;transition:all .12s;margin-bottom:-1px}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:var(--text2)}
.fg{margin-bottom:12px}
.fl{display:block;font-size:14px;color:var(--text3);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border .15s;resize:vertical}
.fi:focus{border-color:var(--accent2)}
.fi::placeholder{color:var(--text3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.wbtn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:5px;background:var(--accent);color:var(--on-accent);border:1px solid var(--accent2);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;transition:all .14s;margin-top:2px}
.wbtn:hover{background:var(--wbtn-hover)}
.wbtn-o{background:transparent;color:var(--text2);border:1px solid var(--border2)}
.wbtn-o:hover{background:var(--bg3);color:var(--text)}
.wdiv{height:1px;background:var(--border);margin:11px 0}
.notice{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;border-radius:5px;margin-bottom:12px;font-size:14px;line-height:1.6}
.ni{background:var(--str-bg);border:1px solid var(--str-b);color:var(--str)}
.nw{background:var(--qal-bg);border:1px solid var(--qal-b);color:var(--qal)}
.gbl{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:3px;font-size:12px;font-weight:700;flex-shrink:0}
.g1b{background:var(--out-bg);color:var(--out);border:1px solid var(--out-b)}
.g2b{background:var(--str-bg);color:var(--str);border:1px solid var(--str-b)}
.g3b{background:var(--sal-bg);color:var(--sal);border:1px solid var(--sal-b)}
.g4b{background:var(--ofr-bg);color:var(--ofr);border:1px solid var(--ofr-b)}
.gb-block{background:var(--bg3);border-radius:9px;padding:10px 13px;margin-bottom:12px;border-left:3px solid}
.gb-title{font-size:14px;font-weight:500;margin-bottom:2px}
.gb-sub{font-size:12px;color:var(--text2);line-height:1.5}
.chk-list{display:flex;flex-direction:column;gap:6px}
.chk{display:flex;align-items:flex-start;gap:8px;cursor:pointer}
.chk-box{width:14px;height:14px;border-radius:3px;border:1px solid var(--border2);background:var(--bg3);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.chk-box.ck{background:var(--out);border-color:var(--out)}
.chk-box.ck::after{content:'✓';font-size:10px;color:var(--on-accent)}
.chk-txt{font-size:15px;color:var(--text2);line-height:1.3}
.chk-desc{font-size:14px;color:var(--text3);margin-top:1px}
.chk-txt.ck{color:var(--text3);text-decoration:line-through}
.cf-wrap{margin-bottom:12px}
.cf-lbl{font-size:14px;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);font-weight:500;margin-bottom:4px}
.cf-val{font-size:15px;color:var(--text2);line-height:1.7;background:var(--bg3);border-radius:4px;padding:8px 12px;border-left:2px solid;white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word}
.cf-gl{display:inline-flex;margin-top:4px;border-radius:3px;padding:2px 7px;font-size:12px;font-weight:600}
.done-badge{display:flex;align-items:center;gap:6px;padding:6px 11px;background:var(--out-bg);border:1px solid var(--out-b);border-radius:4px;margin-bottom:13px}
/* asset view */
.av{padding:24px 28px}
.av-stage{margin-bottom:26px}
.av-stage-hdr{display:flex;align-items:center;gap:9px;margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.av-stage-name{font-size:16px;font-weight:500;color:var(--text)}
.av-stage-attr{font-size:14px;color:var(--text3);font-style:italic;margin-left:auto}
.av-list{display:flex;flex-direction:column;gap:1px}
.av-row{display:flex;align-items:stretch;background:var(--bg2);border:1px solid var(--border);cursor:pointer;transition:all .12s}
.av-row:first-child{border-radius:9px 9px 0 0}
.av-row:last-child{border-radius:0 0 9px 9px}
.av-row:only-child{border-radius:9px}
.av-row:not(:last-child){border-bottom-color:transparent}
.av-row:hover{background:var(--bg3);border-color:var(--border2);position:relative;z-index:1}
.av-row.on{background:var(--accent-bg);border-color:color-mix(in srgb, var(--accent2) 50%, transparent)}
.av-bar{width:3px;border-radius:2px 0 0 2px;flex-shrink:0}
.av-body{flex:1;padding:10px 13px;min-width:0}
.av-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:2px}
.av-row.on .av-name{color:var(--accent)}
.av-ref{font-size:14px;color:var(--text2)}
.av-right{display:flex;align-items:center;gap:6px;margin-right:13px;flex-shrink:0}
.av-sec{font-size:12px;color:var(--text3);background:var(--bg4);border-radius:3px;padding:1px 5px;white-space:nowrap}
/* asset detail */
.avd{padding:24px 28px;max-width:740px}
.avd-back{display:flex;align-items:center;gap:5px;margin-bottom:16px;font-size:14px;color:var(--text3);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;padding:0}
.avd-back:hover{color:var(--text2)}
.avd-card{background:var(--bg2);border:1px solid var(--border);border-radius:9px}
/* tooltips — positioned via JS portal, no CSS hover */
.tip{display:inline;cursor:help}
.avd-hdr{padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.avd-stage-lbl{font-size:14px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;opacity:.8}
.avd-title{font-family:'Space Grotesk',sans-serif;font-size:24px;color:var(--text);margin-bottom:9px}
.avd-meta{display:flex;gap:6px;flex-wrap:wrap}
.avd-body{padding:16px 20px}
.avd-desc{font-size:16px;color:var(--text2);line-height:1.8}
.avd-div{height:1px;background:var(--border);margin:14px 0}
.avd-row{display:flex;gap:6px;margin-bottom:7px}
.avd-key{font-size:14px;color:var(--text2);min-width:95px;flex-shrink:0;padding-top:1px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.avd-val{font-size:15px;color:var(--text2);line-height:1.5}
.avd-rat{font-size:15px;color:var(--text2);line-height:1.7;font-style:italic}
/* view-only overlay */
.view-only{background:var(--bg3);border:1px solid var(--border2);border-radius:9px;padding:14px 18px;margin-top:4px}
.view-only-msg{font-size:15px;color:var(--text3);line-height:1.7}
/* dua blocks */
.dua-block{margin:0;border-top:1px solid var(--border);background:transparent}
.dua-toggle{width:100%;background:none;border:none;cursor:pointer;padding:7px 14px;display:flex;align-items:center;gap:7px;text-align:left;font-family:'DM Sans',sans-serif;transition:background .12s}
.dua-toggle:hover{background:var(--bg3)}
.dua-expand-btn{background:none;border:1px solid var(--border2);border-radius:4px;cursor:pointer;color:var(--text3);font-size:11px;padding:2px 6px;margin-left:auto;flex-shrink:0;transition:color .12s,border-color .12s,background .12s;font-family:inherit}
.dua-expand-btn:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-bg)}
.dua-glyph{font-size:12px;flex-shrink:0;opacity:.55}
.dua-label{flex:1;min-width:0}
.dua-kind{font-size:12px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;display:block;line-height:1.2}
.dua-title-txt{font-size:14px;color:var(--text2);line-height:1.3}
.dua-chev{font-size:14px;color:var(--text3);flex-shrink:0;transition:transform .15s}
.dua-chev.open{transform:rotate(0)}.dua-chev.closed{transform:rotate(-90deg)}
.dua-body{padding:2px 14px 12px}
.dua-arabic{font-size:19px;line-height:1.9;color:var(--text);text-align:right;direction:rtl;letter-spacing:.02em;margin-bottom:8px}
.dua-trans{font-size:15px;color:var(--text2);font-style:italic;line-height:1.5;margin-bottom:4px}
.dua-meaning{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:4px}
.dua-source{font-size:14px;color:var(--text2);opacity:.6}
/* Annotation block inside dua body */
.dua-annotations{margin-top:12px;display:flex;flex-direction:column;gap:8px;border-top:1px solid var(--border);padding-top:10px}
.dua-ann-card{background:var(--bg3);border-radius:5px;padding:8px 10px}
.dua-ann-attr{font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px}
.dua-ann-text{font-size:14px;color:var(--text2);line-height:1.65}
/* Governing Attributes block */
.sb-attr-block{border-top:1px solid var(--border);background:transparent}
.sb-attr-toggle{width:100%;background:none;border:none;cursor:pointer;padding:7px 14px;display:flex;align-items:center;gap:7px;text-align:left;font-family:'DM Sans',sans-serif;transition:background .12s}
.sb-attr-toggle:hover{background:var(--bg3)}
.sb-attr-icon{font-size:12px;flex-shrink:0;opacity:.55;color:var(--text2)}
.sb-attr-label{flex:1;min-width:0}
.sb-attr-kind{font-size:12px;text-transform:uppercase;letter-spacing:.8px;font-weight:600;color:var(--text3);display:block;line-height:1.2}
.sb-attr-names{font-size:12px;color:var(--text3);line-height:1.3}
.sb-attr-body{padding:0 10px 10px}
.sb-attr-card{background:var(--bg3);border-radius:5px;padding:9px 11px;margin-bottom:6px}
.sb-attr-card:last-child{margin-bottom:0}
.sb-attr-card-name{font-size:11px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;margin-bottom:5px}
.sb-attr-card-text{font-size:14px;color:var(--text2);line-height:1.65}
/* Readiness & Reflection blocks */
.sb-readiness-block,.sb-reflect-block{border-top:1px solid var(--border);background:transparent}
.sb-readiness-toggle,.sb-reflect-toggle{width:100%;background:none;border:none;cursor:pointer;padding:7px 14px;display:flex;align-items:center;gap:7px;text-align:left;font-family:'DM Sans',sans-serif;transition:background .12s}
.sb-readiness-toggle:hover,.sb-reflect-toggle:hover{background:var(--bg3)}
.sb-rr-icon{font-size:14px;flex-shrink:0;opacity:.55;color:var(--text2)}
.sb-rr-label{flex:1;min-width:0}

.sb-strip-code{font-size:11px;font-weight:700;letter-spacing:.5px}
.sb-strip-dot{width:6px;height:6px;border-radius:50%}
.sb-expand-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:6px;line-height:1;margin-top:auto;margin-bottom:8px}

.mob-il-tab{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;background:var(--bg2);border:none;border-bottom:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;text-align:left;position:sticky;top:0;z-index:7;transition:color .12s}

.mob-pipe-tab{display:flex;align-items:center;gap:8px;width:100%;padding:10px 14px;background:var(--bg2);border:none;border-bottom:1px solid var(--border);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:var(--text3);cursor:pointer;text-align:left;transition:color .12s}

.draft-btn.accept{background:var(--success-bg);border-color:var(--success-b);color:var(--success)}
.draft-btn.reject{background:var(--danger-bg);border-color:var(--danger-b);color:var(--danger)}
.api-overlay{position:fixed;inset:0;background:var(--overlay);z-index:300;display:flex;align-items:center;justify-content:center}
.api-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:28px;max-width:420px;width:90%}

.api-input{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:monospace;font-size:14px;box-sizing:border-box}

.api-actions{display:flex;gap:8px;margin-top:16px}
.api-btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:13px;font-family:inherit}
.api-btn.primary{background:var(--accent);color:var(--on-accent);border-color:var(--accent)}

/* ── Accessibility ── */
.rs-btn:focus-visible,.sg-btn:focus-visible,.wbtn:focus-visible,.draft-btn:focus-visible,.api-btn:focus-visible,.dua-toggle:focus-visible,.sb-attr-toggle:focus-visible,.sb-readiness-toggle:focus-visible,.sb-reflect-toggle:focus-visible,.sb-strip-btn:focus-visible,.tab:focus-visible,.sb-item:focus-visible,.sb-sec-hdr:focus-visible,.av-row:focus-visible,.tc:focus-visible,.role-mob:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}}

  {id:'all',    label:'All',        sub:'All roles',                   color:'var(--accent)',  bg:'var(--accent-bg)',  initials:'',   scope:'Full pipeline view — all tools across all 9 stages.', tip:'Full pipeline view showing all tools across all 9 stages. Use this view for system-wide oversight, cross-stage dependency tracking, and holistic pipeline health monitoring.'},

   tip:'Responsibilities: Full pipeline access and oversight. The only role with access to the Financial Stewardship Horizon, Covenant Integrity Audit, and the Restoration Mandate. Responsible for all sensitive declarations and cycle-end reckonings.\n\nPrinciple: The ultimate fiduciary of the Barakah. Must hold the hard truth at the beginning during Intake (FND) and the honest reckoning at the end during Optimization (OPT). The system tells the truth, not what flatters.\n\nKPI: The Stewardship Score (MG-01) and Barakah Health Index (MG-03) Overall Reading, ensuring the system expands only when genuinely restored rather than running on depleted capacity.'},

   tip:'Responsibilities: Edits all messaging and creative assets across Strategy, Offer, Outreach, and Sales. Views all research outputs strictly as source material.\n\nPrinciple: Marketing language is bound by the covenant (Al-Haqq) and reliance on God (Ar-Razzaq). Must never manufacture urgency or scarcity, never paraphrase verbatim VoC data, and ensure every outcome claim carries an honest G-label.\n\nKPI: Qualified Outreach Conversion Rate (CM-1) — the percentage of outreach recipients who take the defined first action based on an honest, non-pressured invitation.'},

   tip:'Responsibilities: Edits all paid and distribution infrastructure, including ad platforms, tracking pixels, launch sequences, social channels, and website deployment.\n\nPrinciple: Builds the infrastructure of truth. Accurate tracking is not optional — it captures the evidence base for the next cycle\'s G-label claims and allows the system to reckon honestly (Al-Hasib) at the end of the cycle.\n\nKPI: Clean and traceable data flow that accurately feeds the G-Label Accuracy Report (OPT-S3) during the Optimization stage.'},

const BBOS_SCHEMA_VERSION = '1.0';

function validateSchema(json){
  const errors=[];
  if(!json||typeof json!=='object') return {valid:false,errors:['Not a valid object']};
  if(json.schema_version!==BBOS_SCHEMA_VERSION) errors.push('Schema version mismatch: expected '+BBOS_SCHEMA_VERSION);
  if(!json.stage||!STAGES[json.stage]) errors.push('Invalid or missing stage: '+json.stage);
  if(!json.assets&&!json.no_ship) errors.push('Missing assets and no no_ship flag');
  if(json.assets){
    Object.keys(json.assets).forEach(toolId=>{
      const t=TOOLS.find(x=>x.id===toolId);
      if(!t) errors.push('Unknown tool: '+toolId);
      else if(t.stage!==json.stage) errors.push('Tool '+toolId+' belongs to stage '+t.stage+', not '+json.stage);
    });
  }
  return {valid:errors.length===0,errors};
}

function buildSystemPrompt(stageKey, roleId, options={}){
  const stage=STAGES[stageKey];
  if(!stage) return '';
  const roleMeta=ROLES.find(r=>r.id===roleId)||ROLES[0];
  const stageTools=TOOLS.filter(t=>t.stage===stageKey&&(roleId==='all'||rolePerm(t,roleId)==='O'));

  const targetTools=options.singleTool?stageTools.filter(t=>t.id===options.singleTool):stageTools;

  const upstreamParts=[];
  const seen=new Set();
  targetTools.forEach(t=>{
    (t.sources||[]).forEach(src=>{
      if(seen.has(src.tool)) return;
      seen.add(src.tool);
      const notes=localStorage.getItem('bbos_notes_'+src.tool)||'';
      const srcTool=TOOLS.find(x=>x.id===src.tool);
      let fieldContent='';
      if(srcTool&&srcTool.fields){
        srcTool.fields.forEach(f=>{
          const v=localStorage.getItem('bbos_field_'+src.tool+'_'+f.key)||'';
          if(v) fieldContent+='\n'+f.label+': '+v;
        });
      }
      const content=notes||fieldContent||'NOT YET COMPLETED';
      upstreamParts.push('['+src.label+']\n'+content);
    });
  });

  const existingParts=[];
  targetTools.forEach(t=>{
    const notes=localStorage.getItem('bbos_notes_'+t.id)||'';
    let fieldContent='';
    if(t.fields){
      t.fields.forEach(f=>{
        const v=localStorage.getItem('bbos_field_'+t.id+'_'+f.key)||'';
        if(v) fieldContent+='\n'+f.label+': '+v;
      });
    }
    if(notes||fieldContent) existingParts.push('['+t.id+' — '+t.label+'] (EXISTING)\n'+(notes||fieldContent));
  });

  const factoryPrompt=(typeof window.FACTORY_PROMPTS!=='undefined'&&window.FACTORY_PROMPTS[stageKey])||'Generate high-quality content for each tool based on its description and upstream inputs.';

  return `You are a BBOS Asset Generator for Stage ${stage.code} ${stage.key} — ${stage.name}.
Governing attributes: ${stage.attr}.
Layer: ${LAYERS[stageKey]}.

ROLE: ${roleMeta.label}
Generate content ONLY for tools this role owns.

TOOLS TO POPULATE:
${targetTools.map(t=>`- ${t.id}: ${t.label} (${t.asset||''})
  Description: ${t.desc}
  ${t.fields?`Fields: ${t.fields.map(f=>f.key+' ('+f.label+')').join(', ')}`:'Single content field'}`).join('\n')}

${upstreamParts.length?`UPSTREAM SOURCES (use as inputs):
${upstreamParts.join('\n\n---\n\n')}`:'No upstream sources for this stage.'}

${existingParts.length?`EXISTING CONTENT (build on, do not discard):
${existingParts.join('\n\n---\n\n')}`:''}

FACTORY INSTRUCTIONS:
${factoryPrompt}

G-LABEL RULES:
- G1: verifiable fact with named evidence
- G2: strong pattern, documented precedent
- G3: informed inference, limited data
- G4: aspiration, not yet evidenced
- Assign a G-label to each tool output

OUTPUT FORMAT: Return ONLY valid JSON matching this schema:
{
  "schema_version": "1.0",
  "stage": "${stageKey}",
  "role": "${roleId}",
  "generated_at": "ISO-8601 timestamp",
  "no_ship": null,
  "assets": {
    "[toolId]": {
      "content": "working notes text for the tool",
      "fields": { "[fieldKey]": "value for each field" },
      "g_label": "G1|G2|G3|G4",
      "proof_pending": ["list of claims needing proof"],
      "status": "filled"
    }
  }
}

Return ONLY the JSON. No preamble, no markdown fences, no explanation.`;
}

/* ── PROVIDER-AGNOSTIC API CALLER ── */
async function callLLM(systemPrompt,userMessage,options={}){
  const providerId=options.provider||localStorage.getItem('bbos_provider')||'anthropic';
  const provider=LLM_PROVIDERS[providerId];
  if(!provider) throw new Error('Unknown provider: '+providerId);
  const apiKey=localStorage.getItem('bbos_api_key_'+providerId);
  if(!apiKey) throw new Error('No API key set for '+provider.name+'. Click the Key button in the topbar to configure it.');
  const model=options.model||localStorage.getItem('bbos_model')||provider.defaultModel;
  const maxTokens=options.maxTokens||8192;
  const endpoint=provider.getEndpoint?provider.getEndpoint(apiKey,model):provider.endpoint;
  const headers=provider.buildHeaders(apiKey);
  const body=provider.buildBody(systemPrompt,userMessage,model,maxTokens);
  const controller=new AbortController();
  const timeout=setTimeout(()=>controller.abort(),options.timeout||120000);
  try{
    const resp=await fetch(endpoint,{method:'POST',signal:controller.signal,headers,body:JSON.stringify(body)});
    clearTimeout(timeout);
    if(!resp.ok){
      const errBody=await resp.text().catch(()=>'');
      if(resp.status===401) throw new Error('Invalid API key for '+provider.name+'. Please check your key.');
      if(resp.status===429) throw new Error('Rate limited by '+provider.name+'. Please wait and try again.');
      throw new Error(provider.name+' error '+resp.status+': '+errBody.slice(0,200));
    }
    const data=await resp.json();
    const text=provider.parseResponse(data);
    let jsonStr=text.trim();
    if(jsonStr.startsWith('```')) jsonStr=jsonStr.replace(/^```(?:json)?\n?/,'').replace(/\n?```$/,'');
    try{return JSON.parse(jsonStr);}catch(parseErr){throw new Error('LLM returned invalid JSON: '+jsonStr.slice(0,120));}
  }catch(e){
    clearTimeout(timeout);
    if(e.name==='AbortError') throw new Error('Request timed out after '+(options.timeout||120000)/1000+'s');
    throw e;
  }
}
const callAnthropicAPI=callLLM;

function synthesizeAssets(payload){
  const validation=validateSchema(payload);
  if(!validation.valid) return {error:'Invalid schema',details:validation.errors,written:[],drafted:[],skipped:[]};

  if(payload.no_ship) return {noShip:payload.no_ship,written:[],drafted:[],skipped:[]};

  const results={written:[],drafted:[],skipped:[],warnings:[]};

  Object.entries(payload.assets).forEach(([toolId,asset])=>{
    const tool=TOOLS.find(t=>t.id===toolId&&t.stage===payload.stage);
    if(!tool){results.skipped.push({id:toolId,reason:'Tool not found in stage'});return;}

    const existingNotes=localStorage.getItem('bbos_notes_'+toolId)||'';
    const isDraft=true; /* always route AI output to draft review */

    if(asset.content){
      const key=isDraft?'bbos_draft_notes_'+toolId:'bbos_notes_'+toolId;
      safeSet(key,asset.content);
    }

    if(asset.fields&&tool.fields){
      tool.fields.forEach(f=>{
        if(asset.fields[f.key]){
          const key=isDraft?'bbos_draft_field_'+toolId+'_'+f.key:'bbos_field_'+toolId+'_'+f.key;
          safeSet(key,asset.fields[f.key]);
        }
      });
    }

    if(asset.g_label) safeSet('bbos_gl_'+toolId,asset.g_label);
    if(asset.gate) safeSet('bbos_gate_'+toolId,asset.gate);
    if(asset.complete) safeSet('bbos_complete_'+toolId,'1');

    if(isDraft){
      safeSet('bbos_draft_meta_'+toolId,JSON.stringify({
        g_label:asset.g_label||'',
        proof_pending:asset.proof_pending||[],
        generated_at:payload.generated_at||new Date().toISOString(),
        status:'draft'
      }));
      results.drafted.push(toolId);
    }else{
      results.written.push(toolId);
    }
  });

  return results;
}

function handleFileUpload(file){
  return new Promise((resolve,reject)=>{
    if(!file) return reject(new Error('No file selected'));
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const json=JSON.parse(e.target.result);
        const result=synthesizeAssets(json);
        resolve(result);
      }catch(err){
        reject(new Error('Invalid JSON file: '+err.message));
      }
    };
    reader.onerror=()=>reject(new Error('Failed to read file'));
    reader.readAsText(file);
  });
}

function getToolState(t){

  const hasData=(t.fields&&t.fields.some(f=>localStorage.getItem('bbos_field_'+t.id+'_'+f.key)))||!!localStorage.getItem('bbos_notes_'+t.id);
  if(hasData){

market:`## S1 — Market Definition
### The Clarity Practice · Stage 3 STR Research Factory Output

---

### Buyer Context

Muslim women in English-speaking markets (United States, United Kingdom, Canada, Australia) operating solo service businesses — coaching, consulting, brand design, copywriting, photography, and adjacent fields.

Annual revenue: $60,000–$200,000. Years operating: 3–8. Business model: primarily 1:1 client work, often priced by hour or project rather than by outcome. No structured offer and no defensible positioning statement.

They are technically excellent. Their clients get results. They are chronically underpriced relative to the outcomes they produce, and they know it — but they cannot hold the number when they say it aloud.

### Immediate Goal

Establish a positioned offer with a specific audience, a price point they can state without apologising, and a 90-day client acquisition plan they can execute immediately — without rebuilding their business from scratch or burning existing client relationships.

### Journey Stage

Post-first-success, pre-expansion. The model works. The results are real. The ceiling is not a competence problem — it is a positioning and pricing problem that has compounded over years of undercharging.

### What Has Already Been Tried

Generic business coaching programs that did not account for the cultural dynamics shaping their pricing behaviour. Online pricing courses that produced a number but not the confidence to hold it. Group masterminds where they were the only Muslim woman in the room and the advice did not land in their context.

### Market Maturity Assessment

**Level 3 — Solution aware, product unaware.**

The prospect knows that positioning and pricing work exist. She may have taken a course, read a book, or heard another coach talk about it. She does not know that a solution exists that is specifically designed for the structural forces operating in her context.

Implication: messaging does not need to educate her on the concept of positioning. It needs to explain why what she has tried did not work — and why this is different.

### Secondary Audience

Muslim female creatives (brand designers, copywriters, photographers) in the $30,000–$80,000 range approaching their first pricing ceiling. Not yet the primary buyer — they are 12–18 months behind the primary segment. The pipeline cohort for Cycle 2 and beyond.

### Market Size Estimate

Approximately 180,000 Muslim female business owners active in English-speaking markets. Sub-segment with $60,000+ revenue and 3+ years operating: estimated 22,000–35,000 qualified prospects.

**G-label: G3** — estimate derived from broader Muslim female entrepreneur population statistics and service business revenue distribution data. Not directly verifiable from a single primary source. Treat as directional, not definitive.`,

pains:`## S3 — Emotional Triggers & Enemy Narrative
### The Clarity Practice · Stage 3 STR Research Factory Output

---

### Top 3 Verbatim Fears

These are exact phrases from source material — forums, direct message conversations, intake form submissions, and direct interviews. They are not paraphrased.

**F1:** "I'm terrified that if I raise my prices, every client I have will leave and I'll have to start over"

**F2:** "I don't know how to explain what I do without adding five disclaimers about why it's worth it"

**F3:** "I look at what I charge and I feel embarrassed — not because it's wrong, but because I can't defend it out loud"

---

### Top 3 Verbatim Desires

**D1:** "I want to be able to say my price without my voice going quiet at the end"

**D2:** "I just want someone to hand me a number and tell me it's right so I can stop second-guessing myself"

**D3:** "I want my clients to feel like they got a deal at the price I charged — not like I gave them a discount because I was scared"

---

### The Enemy Narrative

> The Enemy is never the client's character, choices, or mindset. The Enemy is the convergent set of forces that has produced their situation despite their efforts.

**The Enemy: The Credibility Gap System**

The Credibility Gap System is the convergent set of forces — chronic underrepresentation in mainstream business frameworks, first-generation immigrant scarcity conditioning, community social pressure to discount for "sisters," and the complete absence of visible Muslim female operators charging premium rates publicly — that has systematically trained capable, results-producing women to distrust their own market value despite documented client outcomes.

The Enemy is not a mindset problem. It is a structural absence that was never corrected, now presenting as an internal confidence failure.

**What the Enemy looks like in practice:**

· She researches what to charge and finds no one who looks like her at the price point she deserves.
· She quotes a price and immediately offers a discount before the client responds.
· She explains her services with qualifications and disclaimers that undermine the quote before it lands.
· Her community of peers operates in the same price range she does — normalising underpricing as standard.
· When she considers raising prices, she imagines the client's reaction, not the value she delivers.

**What the Enemy is not:**

· Laziness, lack of ambition, or unwillingness to do the work.
· Imposter syndrome (the generic framing that locates the problem in her psychology).
· An individual failure that a mindset shift will resolve.

The Enemy is a system. It can be named, dismantled, and replaced with a structure that holds.`,

avatar:`## S2 — VoC Buying Language Bank
### The Clarity Practice · Stage 3 STR Research Factory Output

---

> Every phrase below is verbatim from source material. No paraphrasing. The exact words someone used when the performance dropped are a window into a reality they did not consciously choose to share. Paraphrasing closes that window.

**Sources:** 3 forum threads (Muslim female entrepreneur communities), 4 direct interviews, 8 DM conversations, 7 anonymous intake form submissions.

**Total phrases collected:** 22 · **Selected for Language Bank:** 15

---

### Pricing Language

· "I don't know what I'm worth in the market — I just look at what everyone else charges and go slightly below"
· "Every time I raise my prices I spend three days dreading the conversation"
· "I charged less because I thought she might not be able to afford it — she never asked me to"
· "I said the number and then immediately said 'but we can discuss it' — I don't know why I did that"
· "I want to charge what I actually need to charge. I just don't know how to say it without apologising"

### Positioning Language

· "I can't explain what I do in one sentence without it sounding either too small or too grandiose"
· "I keep trying to niche down and then getting scared and broadening it again"
· "Every time I write my bio I feel like I'm either underselling or overpromising"
· "I don't know who my ideal client is — I work with anyone who pays me"

### Confidence and Visibility Language

· "I'm scared that if I'm specific about who I work with, I'll turn people away"
· "I see other coaches charging five figures and I genuinely don't understand what they know that I don't"
· "I feel embarrassed calling myself an expert when I still doubt my own prices"

### Community and Cultural Context

· "The sisters in my network all charge similar rates — it would feel weird to charge significantly more"
· "I feel guilty charging full price when the client is also Muslim and I know money is tight"
· "There's no one who looks like me charging what I actually want to charge. I don't know if it's possible for me"

### What They Want to Feel

· "I just want to feel solid when someone asks what I charge. Not defensive. Just solid."

---

### Highest-Frequency Convergence Cluster

Three phrases appeared — in different words — across more than 6 independent sources: the voice going quiet when saying the price, the compulsion to add disclaimers before a client has said anything, and the absence of visible role models at premium rates. These three are the emotional core of the Credibility Gap System as the prospect experiences it.`,

salesscript:`## Sales Script — The Clarity Practice
### Stage 6 SAL Asset Factory Output · 48-Minute Call Structure

---

> This script is the covenant read aloud. Nothing new is introduced here that is not already in the Offer Covenant. An objection response that redirects without resolving is not a response — it is evasion. Every door that closes, closes with the prospect's dignity intact.

---

### Pre-Call Preparation (operator, before dialing)

Review the prospect's intake form. Know their service type, current pricing, what they've tried, and what they said success looks like. The Discovery section is not for gathering information you could have read — it is for going deeper than the form went.

---

### Opening (5 minutes)

"Before we start — there's nothing to buy today. This conversation is for you to figure out whether the Clarity Practice is the right next step for where you are. My job is to ask the right questions. Your job is to be honest. Sound fair?"

[Wait for confirmation.]

"Good. Tell me a little about where you are right now."

---

### Discovery (18 minutes — 6 questions)

Ask these in order. Do not skip. The sequence matters — each question opens the next.

**Question 1 — Current state**
"Tell me about your business. What do you do, who do you work with, and what does revenue look like right now?"

[Listen for: service type, client type, revenue range, pricing model. Do not move on until you have these.]

**Question 2 — Pricing history**
"When did you last raise your prices, and what happened?"

[Listen for: whether they raised at all, how the conversation went, whether clients pushed back or accepted. A prospect who has never raised prices is different from one who raised and lost clients.]

**Question 3 — Articulation test**
"If I asked you to describe what you do in one sentence right now — what would you say?"

[Listen for: disclaimers, qualifications, hesitation, the word "basically," any sentence that requires a follow-up to understand. Note the exact words. These will matter later.]

**Question 4 — Previous attempts**
"What have you tried so far to fix this? What happened?"

[Listen for: specific programmes, coaches, courses. What they tried tells you what hasn't worked. The answer also tells you how solution-aware they are.]

**Question 5 — Success definition**
"What would need to be true in 6 weeks for you to look back and say this was the right decision?"

[Listen for: specificity. A vague answer ("I'd feel more confident") is worth probing. A specific answer ("I'd have a price I could state and a plan to get clients at that price") confirms alignment with the Promise.]

**Question 6 — Timing**
"What's making you consider this now? Why not 6 months ago, or 6 months from now?"

[Listen for: urgency, a recent trigger (lost client, awkward pricing conversation, seeing a competitor charge more). The timing question reveals what's actually motivating the call.]

---

### Transition

"Thank you for sharing that. Let me tell you exactly what we do — and then you can tell me whether it fits."

---

### Presentation (12 minutes)

**The Promise**
"Within 6 weeks, you will have three things in writing: a positioning statement that names your specific audience and the exact transformation you produce, a price you can state without apologising, and a 90-day client acquisition plan you can begin the day after our final session."

**The Mechanism**
"We work through this in 6 weekly 90-minute sessions. The first two sessions are about naming the forces that have been working against your pricing confidence — not as a mindset problem, but as a structural reality. Sessions 3 and 4 build your positioning statement and offer one-pager together. Session 5 anchors the price using a valuation framework, not a market comparison. Session 6 builds the 90-day plan."

**The Scope Map**
"Here's what's included: the 6 sessions, a written positioning statement, an offer one-pager, a pricing calculator, the 90-day plan, and async Voxer access Monday through Thursday between sessions for questions and micro-reviews.

Here's what's not included: website copy, marketing asset production, ongoing coaching beyond the 6 weeks, and anything not on that list. I want to be clear about that so there are no surprises."

**The Guarantee**
"If you complete all 6 sessions, submit your pre-work within 48 hours before each session, and at the end of Session 6 still cannot produce a specific audience statement, a defensible price point, and a written 90-day plan — I give you 3 additional sessions at no charge, focused specifically on what's unresolved. The only condition is that you've done the pre-work."

**The Price**
"The investment is $3,500 paid in full, or $1,850 split across two payments — one at the start and one at the beginning of Week 4."

---

### Pause

"Does that match what you were looking for? And is there anything in what I described that doesn't fit your situation?"

[Listen fully before responding. Do not fill silence.]

---

### Objection Responses (8 minutes — 4 prepared)

> Each response resolves the concern. It does not redirect, reframe away from the objection, or use urgency to override it.

**Objection 1 — "I need to think about it."**
"That's completely fair. What specifically do you need to think about — is it the price, the timing, or whether this is the right fit for where you are?" [Wait.] Address exactly what they name. Do not assume.

**Objection 2 — "I can't afford it right now."**
"I hear that. Can I ask — what does your pricing look like now, and what would it look like if the positioning problem was solved in 6 weeks? I'm not asking you to justify the investment. I'm asking you to see whether the gap between where you are and where you'd be is large enough that this conversation is worth having."

If the gap is not large enough — let them go. A client who cannot afford it and will not benefit enough to recover the cost is not a fit.

**Objection 3 — "I'm not sure this will work for my situation."**
"That's a fair concern. What specifically about your situation feels different?" [Listen.] "Here's what I know from the clients I've worked with: the Credibility Gap System was affecting their pricing regardless of niche or service type. What I don't know is whether that's what's happening for you — but based on what you've shared today, [reference something specific from Discovery], I think it is. You know your situation better than I do."

**Objection 4 — "I need to check with my partner / husband / accountant."**
"Of course. What would help them feel informed? I can send a one-page summary of exactly what's included, what it costs, and what the guarantee says. Would that help?"

[Send the summary. Set a specific follow-up time — not "whenever you're ready." A specific day and time.]

---

### Close (5 minutes)

"Based on what you've shared — [reference the specific thing from Discovery that confirms the fit] — I think this is the right fit. The next step is a payment link and a Session 1 booking. We'd start [specific date]. Does that feel right?"

[If yes:] "Perfect. I'll send the contract and invoice within the hour. Once it's signed and paid, you'll get the onboarding pack — everything you need before Session 1."

[If not yet:] "What's the specific question standing between you and a yes? Let's see if I can answer it now." If it cannot be answered, set a concrete follow-up time. Do not leave it open-ended.

---

### No-Fit Close

"Based on what you've told me today, I don't think this is the right fit — and I want to be straight with you about that. [Specific reason — not vague.] That doesn't mean the problem isn't real. It means this particular offer isn't the right tool for where you are right now. [If a more appropriate resource exists, name it.] I appreciate you taking the time today."

[End the call. Do not follow up with a second pitch.]`,

settingscript:`## Setting Script — The Clarity Practice
### Stage 6 SAL Asset Factory Output · 12-Minute Qualification Call

---

> This call protects both the prospect and the operator. Disqualifying someone before the sales call is As-Sittir in practice — protecting them from entering an offer that was not designed for their situation. A setter who overlooks a disqualifier to fill the pipeline is not being helpful.

---

### Pre-Call Check

Before dialing: review the intake form. If any hard disqualifier is already visible, do not proceed to the call — send the No-Fit message instead. The call is for cases where the intake form is ambiguous or a qualifier needs to be confirmed verbally.

**Hard disqualifiers (do not proceed to call):**
· Product business, e-commerce, or any business that is not a service business
· Business with employees or contractors (this is a solo operator programme)
· Operator seeking done-for-you services
· Less than 3 years in business or revenue below $30,000

**Soft qualifiers (confirm on the call):**
· Revenue in the $60,000–$200,000 range (intake may say "around $80k" — confirm)
· No existing positioned offer (intake may be unclear — confirm)
· Muslim female (intake confirms, verbal call confirms tone and context fit)

---

### Opening (2 minutes)

"Hi [name], thanks for taking the time. This is [operator name] from the Clarity Practice. This call is short — about 10 minutes. I want to ask you a few questions to make sure our 1:1 programme is actually the right fit for where you are. Some people who apply aren't in the right place for it yet, and I'd rather tell you that now than have you on a longer call that isn't useful. Sound okay?"

[Wait for yes.]

---

### Qualification Questions (8 minutes — 5 questions)

**Q1 — Business type**
"Tell me briefly what you do and who you work with."

[Listening for: service business, solo operation, identifiable audience. If product business, e-commerce, or team-based — No-Fit.]

**Q2 — Revenue and stage**
"Roughly, where does your annual revenue sit? Ballpark is fine."

[Listening for: $60,000–$200,000 range. Below $30,000 is a No-Fit for this programme specifically — not enough market proof yet. Above $200,000 may be a different programme fit — note it, do not disqualify automatically.]

**Q3 — Current positioning**
"If I asked you to describe what you do and who you help in one sentence, what would you say?"

[Listening for: vagueness, disclaimers, hedging, the inability to produce a clean sentence. That pattern confirms the problem the offer solves. A prospect who can produce a clean, confident sentence is potentially already past the point where this programme is needed.]

**Q4 — What's been tried**
"Have you done anything before to try to sort out your positioning or pricing — a course, a coach, anything like that?"

[Listening for: solution-awareness. This is not a disqualifier — it helps the setter understand where the prospect is in the buying journey.]

**Q5 — Capacity and readiness**
"The programme is 6 weekly sessions with pre-work before each one. Do you have that kind of time and bandwidth in the next 6 weeks?"

[Listening for: capacity. A prospect who cannot commit to 6 sessions is not a fit right now — timing, not disqualification.]

**If qualified:**
"Based on what you've shared, I think this is worth a proper conversation with [operator name]. I'm going to send you a booking link for a 45-minute call — that's where you'll get the full picture of how the programme works and what it costs. The link will give you a few times in the next week. Does that work?"

"Based on what you've shared, I don't think this programme is the right fit for where you are right now — and I want to be honest with you about that. [Specific reason.] That's not a reflection on your business or what you're building. This particular programme was designed for [specific ICP description], and the fit isn't right here. [If appropriate, name a more suitable resource.] Thank you for taking the time."

[End the call. Do not soften the no-fit into an ambiguous maybe. The prospect must know clearly what the decision is.]`,

nurture:`## Nurture Sequences — The Clarity Practice

salesletter:`## Sales Letter — The Clarity Practice
### Stage 5 OUT Asset Factory Output · 1,840 Words

---

### Before you read this, one thing:

Everything in this letter is grounded in documented client outcomes, verbatim language from real conversations, and a specific offer with a written guarantee. No manufactured urgency. No aspirational claims dressed up as results. If something sounds too good to be true in here, tell me — and I'll show you the evidence behind it.

### You're not undercharging because you're not good enough.

You already know this.

You have clients who get results. You have testimonials, if you've bothered to ask for them. You have years of work in a field you understand deeply.

And you're still charging a price that doesn't match any of that.

The reason isn't imposter syndrome. Imposter syndrome is about doubting your capability. You don't doubt your capability — you doubt your right to be paid what you're worth. Those are different problems.

The Credibility Gap System is the convergent set of forces — chronic underrepresentation in mainstream business frameworks, first-generation immigrant scarcity conditioning, community social pressure to discount for sisters, and the complete absence of visible Muslim female operators charging premium rates publicly — that has trained capable, results-producing women to distrust their own market value.

It is not your fault. It was not created by anything you did. But it is operating in your business right now, in every pricing conversation you have.

The way out is not a mindset shift. The way out is a structure that gives you something to stand on when you say the number.

That structure is what the Clarity Practice produces.

The Clarity Practice is a 6-week 1:1 programme for Muslim female service business owners who are technically excellent and chronically underpriced.
