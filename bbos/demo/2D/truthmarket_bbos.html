executionsop:`## Execution SOP — The Clarity Practice
### Stage 7 DLR Appendix C

---

> Every delivery step traces directly to the OFR Scope Map. No step in this SOP exists outside the Scope Map. Steps designated as Ihsan additions are marked with ⧁.

---

### Pre-Delivery Baseline

Before Session 1, confirm:
· OFR Scope Map reviewed
· Promise confirmed: positioning statement, defensible price, 90-day plan — all three in writing by Session 6
· Guarantee conditions reviewed: 6 sessions, pre-work submitted within 48 hours, all three deliverables produced
· Client Intake Form complete
· IC-OFR and IC-DLR gates passed

---

### Session 1 — Enemy Identification, Part 1

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 1

**Pre-work operator reviews:** Client's one-sentence business description (Q13), what they've tried (Q12), client definition of success (Q14)

**Session structure:**
· Opening (5 min): confirm the Promise in the client's own words — what does success look like by Session 6?
· Core work (70 min): work through the 5 Credibility Gap System forces in the client's specific context. For each force: does it apply? How is it showing up? What specific behaviour does it produce?
· Close (15 min): summarise what was named. Client states in their own words: "The forces working against my pricing confidence are [...]"

**Deliverable:** Named force map — the specific Credibility Gap System components operating in this client's situation

**⧁ Ihsan addition:** Send a voice note after the session — not a summary, just an acknowledgment of what was named. "You named something today that a lot of people spend years avoiding. That matters." This is not in the Scope Map. It is Al-Wali in practice.

---

### Session 2 — Enemy Identification, Part 2 + ICP Crystallisation

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 2

**Pre-work:** Client brings 5 examples of how the forces named in Session 1 showed up in actual client conversations or pricing decisions

**Session structure:**
· Review (20 min): walk through the 5 examples. Confirm the pattern. Build the named narrative.
· ICP work (55 min): narrow the audience from current description to specific, qualifiable profile. Who specifically — not "coaches and consultants" but one type of person in one type of situation
· Close (15 min): client states ICP in one sentence. Operator confirms: could we qualify or disqualify someone against this?

**Deliverable:** Crystallised ICP — specific enough to qualify or disqualify in 2 minutes

**Milestone 1 triggered:** "I can name the forces working against my pricing confidence."
Send Milestone 1 message within 2 hours of session end.

---

### Session 3 — Positioning Statement

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 3

**Pre-work:** Client drafts their current positioning statement (one attempt, honest, not polished)

**Session structure:**
· Review draft (15 min): what is specific, what is vague, what is aspirational vs deliverable-grounded
· Build (60 min): work through the 3 positioning decisions — who specifically, what changes for them specifically, what you will and will not do — producing the statement together in the session
· Finalise (15 min): statement is reviewed until both operator and client can read it aloud without qualifying it

**Deliverable:** Written positioning statement — finalised, reviewed, in the client's hands

**QC check (IC-OFR-1 applied to client's positioning):** Can the client read this statement to a prospect and have the prospect self-select in or out? If not, the session is not complete.

**Milestone 2 triggered:** "I have a written statement that describes exactly who I serve."
Send Milestone 2 message with positioning statement PDF within 24 hours.

---

### Session 4 — Offer One-Pager

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 4

**Pre-work:** Client writes a first draft of their offer one-pager using the positioning statement as the foundation

**Session structure:**
· Review draft (20 min): apply Scope Map structure — Promise, Included, Excluded, Guarantee, Price
· Refine (55 min): fill gaps, tighten language, ensure every Included item is specific
· Finalise (15 min): offer one-pager complete and reviewed

**Deliverable:** Offer one-pager — specific enough that a client could accept or decline based on it alone

---

### Session 5 — Price Anchoring

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 5

**Pre-work:** Client completes pricing calculator template (provided by operator after Session 4) — lists each deliverable, assigns a monetary value to each, totals the stack

**Session structure:**
· Review stack (20 min): is every deliverable present? Is the PMV honest?
· Anchor (45 min): work through the valuation framework — what is this outcome worth to the person receiving it? Not market comparison — outcome value
· Moment (25 min): client states the price out loud, in the session. Operator does not fill the silence. The price must be spoken. If the client cannot say it, this work is not complete.

**Deliverable:** Pricing calculator with honest valuation framework + price stated aloud

**Milestone 3 triggered:** "I have a price I can state and justify."
Send Milestone 3 message within 2 hours.

**Guarantee check:** Can the client state the price and explain why it is right? If not, this is flagged before Session 6.

---

### Session 6 — 90-Day Plan + Delivery Close

**Owner:** Operator · **Duration:** 90 minutes · **Week:** 6

**Pre-work:** Client drafts the first 4 weeks of their 90-day plan — specific actions, not intentions

**Session structure:**
· Review draft (20 min): are the actions specific? Do they lead toward qualified client conversations?
· Complete (50 min): build Weeks 5–12 of the plan together. Each week has a named action category and at least one specific task.
· Guarantee check (10 min): can the client produce all three deliverables — positioning statement, defensible price, 90-day plan? All three in writing, in their hands, before the session ends.
· Close (10 min): delivery summary, genuine gratitude, what happens next

**Deliverable:** Written 90-day client acquisition plan — specific, weekly, executable

**Milestone 4 triggered:** "I have a 90-day plan I can begin tomorrow."
Send Milestone 4 message with all 4 deliverables attached within 24 hours.

---

### Week 8 — Check-In (Async)

**Owner:** Operator · **Format:** Voxer voice note

**Operator sends:** "Week 8. How is the plan moving? Even a small action counts — I want to hear it. And if something stalled, that's worth talking about too. Voice note when you can."

**Milestone 5 triggered upon client response.**
Initiate primary proof capture conversation at this point.`,

proofcapture:`## Proof Capture Protocol — The Clarity Practice

4. What would you say to someone who is in the position you were in before?
5. Is there anything you'd be comfortable with me sharing, and in what form?

**Format:** Written answers via email
**Storage:** GHL notes + separate case study file
**Use:** Asset 8 (Proof Plan) update. Case study for Cycle 2 outreach. Only used in the specific form the client approves.

### Proof Plan Update

Upon receiving Week 8 case study:
· Update OFR Asset 8 (Proof Plan) with new documented outcome
· Update G-label on outcome metrics from PROOF PENDING to G1 (if documented directly by client)
· Confirm update in GHL and Pipeline Integrity Ledger`,

offboarding:`## Offboarding Sequence — The Clarity Practice

---

[Client confirms. Document the confirmation.]

**Gratitude (operator's own words — not scripted):**

---

### Day 1 Post-Programme (written message — no calls)

**Subject:** Everything from our 6 weeks together

"[Name],

Everything we produced together is attached to this email: positioning statement, offer one-pager, pricing calculator, 90-day plan.

The plan starts Monday. I'll check in with you in Week 8.

— [Operator name]"

"[Name] — last I heard, [specific thing they told you in Week 8]. That matters.

When you're ready to go deeper — whether that's positioning your next offer, building your acquisition system, or something you haven't named yet — I'm here for it. No rush. The plan you have now is the right place to start.

const TIP_W = 284;
const TIP_PAD = 10;
const SIDEBAR_W = 276;

function Tip({term, def, children}){
  if(window.__tipsOff) return <span>{children}</span>;
  const entry = def || GLOSSARY[term] || (ATTRS[term] ? ['⧁ '+term, ATTRS[term]] : null);
  if(!entry) return <span>{children}</span>;
  const [label, desc] = Array.isArray(entry) ? entry : [term, entry];
  const [tip, setTip] = useState(null);
  const ref = useRef(null);

  const show = () => {
    if(!ref.current) return;
    const r = ref.current.getBoundingClientRect();
    const vw = window.innerWidth;
    const vh = window.innerHeight;

    // Horizontal: center on term, clamped away from sidebar and right edge
    let left = r.left + r.width / 2;
    left = Math.max(SIDEBAR_W + TIP_W / 2 + TIP_PAD, left);  // never behind sidebar
    left = Math.min(vw - TIP_W / 2 - TIP_PAD, left);          // never off right edge

    // Vertical: prefer above; flip below if insufficient space
    const spaceAbove = r.top;
    const spaceBelow = vh - r.bottom;
    const above = spaceAbove >= 110 || spaceAbove >= spaceBelow;
    const top = above ? r.top - 6 : r.bottom + 6;

    setTip({left, top, above});
  };

  const hide = () => setTip(null);

  const portal = tip ? ReactDOM.createPortal(
    <div style={{
      position:'fixed',
      left: tip.left,
      top: tip.top,
      transform: tip.above ? 'translate(-50%, -100%)' : 'translateX(-50%)',
      width: TIP_W,
      background:'var(--bg4)',
      border:'1px solid var(--border2)',
      borderRadius: 8,
      padding: '10px 14px',
      zIndex: 99999,
      pointerEvents: 'none',
      boxShadow: 'var(--shadow)',
      fontSize: 11,
      color: 'var(--text2)',
      lineHeight: 1.6,
      fontFamily: 'var(--font-sans, sans-serif)',
      fontStyle: 'normal',
      fontWeight: 400,
    }}>
      <span style={{display:'block',fontSize:12,fontWeight:600,color:'var(--text)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:5}}>{label}</span>
      {desc}
    </div>,
    document.body
  ) : null;

  return <>
    <span ref={ref} className="tip" onMouseEnter={show} onMouseLeave={hide}>{children}</span>
    {portal}
  </>;
}

function tipify(text, prefix=''){
  if(!text) return text;
  const keys = Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
  const escaped = keys.map(k=>k.replace(/[-.*+?^${}()|[\]\\]/g,'\\$&'));
  const re = new RegExp(`(${escaped.join('|')})`, 'g');
  const parts = text.split(re);
  if(parts.length===1) return text;
  return parts.map((seg,i)=>
    GLOSSARY[seg]
      ? <Tip key={`${prefix}${i}`} term={seg}>{seg}</Tip>
      : seg
  );
}

function AttrLabel({attr, color}){
  const parts = attr.split(' · ');
  return <span>
    {parts.map((p,i)=><span key={p}>
      {i>0&&<span style={{color:'var(--text3)',margin:'0 3px'}}>·</span>}
      <Tip term={p}><span style={{color}}>{p}</span></Tip>
    </span>)}
  </span>;
}

function SLabel({v, style, className}){
  if(!v) return null;
  const m = v.match(/^(S[1-6])(?:\s*[—–-]\s*(.+))?$/);
  if(!m) return <span style={style} className={className}>{v}</span>;
  const [,code,rest] = m;
  const def = S_DEFS[code];
  if(!def) return <span style={style} className={className}>{v}</span>;
  return <Tip def={def}>
    <span style={{...style, cursor:'help'}} className={className}>{v}</span>
  </Tip>;
}
function DocRenderer({content,stageColor}){
  if(!content) return null;
  const ac = stageColor||'var(--accent)';
  const blocks=[];
  let buf=[];
  const flush=()=>{if(buf.length){blocks.push({type:'p',text:buf.join(' ')});buf=[];}};
  content.split('\n').forEach(raw=>{
    const line=raw;
    if(line.startsWith('## ')){flush();blocks.push({type:'h2',text:line.slice(3)});}
    else if(line.startsWith('### ')){flush();blocks.push({type:'h3',text:line.slice(4)});}
    else if(line.startsWith('> ')){flush();blocks.push({type:'callout',text:line.slice(2)});}
    else if(line.startsWith('· ')){flush();blocks.push({type:'li',text:line.slice(2)});}
    else if(line.startsWith('**') && line.endsWith('**') && line.length>4){flush();blocks.push({type:'bold',text:line.slice(2,-2)});}
    else if(line==='---'){flush();blocks.push({type:'hr'});}
    else if(line.trim()===''){flush();}
    else{buf.push(line);}
  });
  flush();
  const elems=[];
  let liGroup=[];
  const flushLi=()=>{
    if(liGroup.length){elems.push(<ul key={elems.length} style={{paddingLeft:18,marginBottom:12}}>{liGroup.map((t,i)=><li key={i} style={{fontSize:16,color:'var(--text2)',lineHeight:1.75,marginBottom:3}}>{tipify(t,`li${i}`)}</li>)}</ul>);liGroup=[];}
  };
  blocks.forEach((b,i)=>{
    if(b.type==='li'){liGroup.push(b.text);return;}
    flushLi();
    if(b.type==='h2') elems.push(<div key={i} style={{fontSize:20,fontWeight:500,color:'var(--text)',marginTop:20,marginBottom:8,paddingBottom:8,borderBottom:`1px solid ${ac}40`}}>{b.text}</div>);
    else if(b.type==='h3') elems.push(<div key={i} style={{fontSize:16,fontWeight:500,color:ac,marginTop:16,marginBottom:6,textTransform:'uppercase',letterSpacing:'.6px'}}>{tipify(b.text,`h3${i}`)}</div>);
    else if(b.type==='callout') elems.push(<div key={i} style={{background:'var(--bg3)',borderLeft:`2px solid ${ac}`,borderRadius:'0 5px 5px 0',padding:'9px 13px',marginBottom:12,fontSize:15,color:'var(--text3)',lineHeight:1.7,fontStyle:'italic'}}>{tipify(b.text,`co${i}`)}</div>);
    else if(b.type==='bold') elems.push(<div key={i} style={{fontSize:16,fontWeight:500,color:'var(--text)',marginBottom:4,marginTop:8}}>{tipify(b.text,`bo${i}`)}</div>);
    else if(b.type==='hr') elems.push(<div key={i} style={{height:1,background:'var(--border)',margin:'16px 0'}}/>);
    else if(b.type==='p') elems.push(<p key={i} style={{fontSize:16,color:'var(--text2)',lineHeight:1.8,marginBottom:12}}>{tipify(b.text,`p${i}`)}</p>);
  });
  flushLi();
  return <div style={{paddingTop:4}}>{elems}</div>;
}

function WsQC({tool,sample}){

    {k:'o4',label:'Is the Mechanism specific enough that a client understands what they are buying — not so generic it could describe any operator in the same field?'},

        <div style={{fontSize:25,fontWeight:500,color:allPass?'var(--out)':'var(--text3)',marginBottom:2}}>{oScore+fScore}/10</div>
        <div style={{fontSize:12,color:'var(--text3)'}}>Total checks passed</div>
      </div>
      <div style={{flex:1,background:allPass?'var(--out-bg)':'var(--bg3)',border:`1px solid ${allPass?'var(--out-b)':'var(--border)'}`,borderRadius:8,padding:'10px 14px',textAlign:'center'}}>
        <div style={{fontSize:16,fontWeight:500,color:allPass?'var(--out)':'var(--text2)',marginBottom:2}}>{allPass?'Gates cleared':'Gates pending'}</div>
        <div style={{fontSize:12,color:'var(--text3)'}}>Delivery may not begin until cleared</div>
      </div>
    </div>

    {sample&&<CF label="Stage gate decision" value="Proceed. IC-OFR gate: all 5 checks passed. IC-DLR gate: all 5 checks passed. No asset required revision before use." accent="var(--out)"/>}
    {!sample&&<button className="wbtn">Record Gate Result</button>}
  </>;

function Workspace({tool,sample,onGenerate,onSelect}){
  if(tool.ws==='validation') return <WsValidation sample={sample}/>;

    })}

/* ── PIL MODAL ── */
function PILModal({onClose,completedStages}){
  const [stage,setStage]=useState(completedStages[0]||'');
  const [reason,setReason]=useState('');
  const submit=()=>{
    if(!reason.trim()){alert('Please provide a reason for the amendment.');return;}
    const log=safeGetJSON('bbos_pil_log',[]);
    log.push({stage,reason:reason.trim(),timestamp:new Date().toISOString()});
    safeSet('bbos_pil_log',JSON.stringify(log));
    showToast('\u2713 PIL amendment logged');
    onClose();

  return <div className="thr-overlay" role="dialog" aria-modal="true" aria-label="Pipeline Integrity Ledger" onClick={e=>{if(e.target===e.currentTarget)onClose();}} onKeyDown={e=>{if(e.key==='Escape')onClose();}}>

      <div style={{padding:'22px'}}>
        <div style={{fontSize:13,fontWeight:500,color:'var(--text)',marginBottom:3}}>Pipeline Integrity Ledger</div>
        <div style={{fontSize:11,color:'var(--text3)',marginBottom:16,lineHeight:1.6}}>Formal amendment to re-open a closed stage. All entries are permanently logged.</div>
        <div style={{marginBottom:11}}>
          <div style={{fontSize:9,letterSpacing:'.6px',textTransform:'uppercase',color:'var(--text3)',marginBottom:5}}>Stage to amend</div>

            {completedStages.map(k=>{const s=STAGES[k];return <option key={k} value={k}>{s.code} — {s.name} (gate closed)</option>;})}

        <div style={{marginBottom:14}}>

        <div style={{display:'flex',gap:7,justifyContent:'flex-end'}}>

function AssetView({selId,setSelId,role,sample,getRat}){
  const tool=TOOLS.find(t=>t.id===selId);
  if(tool) return <AssetDetail tool={tool} onBack={()=>setSelId(null)} role={role} sample={sample} getRat={getRat}/>;
  const byStage={};
  Object.keys(STAGES).forEach(k=>{byStage[k]=[];});
  TOOLS.forEach(t=>{
    if(!byStage[t.stage]) return;
    if(role.id==='all'||rolePerm(t,role.id)!=='-') byStage[t.stage].push(t);
  });
  function stageStatus(key){
    if(sample) return SAMPLE_STAGE_STATUS[key]||'Not Started';
    const st=TOOLS.filter(t=>t.stage===key);
    if(!st.length) return 'Not Started';
    if(st.every(toolIsComplete)) return 'Complete';
    if(st.some(toolHasData)) return 'Active';
    return 'Not Started';
  }
  return <div className="av">
    {Object.values(STAGES).map(s=>{
      const items=byStage[s.key]||[];

function LayersView({onSelect, role, sample}){
  const byStage={};

  function stageStatus(key){
    if(sample) return SAMPLE_STAGE_STATUS[key]||'Not Started';
    const st=TOOLS.filter(t=>t.stage===key);
    if(!st.length) return 'Not Started';
    if(st.every(toolIsComplete)) return 'Complete';
    if(st.some(toolHasData)) return 'Active';
    return 'Not Started';
  }
  const layerOrder=['Think','Execute','Reckon'];
  const layerStages={Think:[],Execute:[],Reckon:[]};
  Object.values(STAGES).forEach(s=>{const l=LAYERS[s.key];if(l)layerStages[l].push(s);});
  return <div style={{padding:'32px 40px',maxWidth:900}}>

    <p style={{color:'var(--text3)',fontSize:15,lineHeight:1.7,marginBottom:32,maxWidth:640}}>Three layers replace the stitched stack: Think (strategy tools), Execute (pipeline tools), and Reckon (retention & optimization tools).</p>

      const lm=LAYER_META[layer];
      const stgs=layerStages[layer];
      return <div key={layer} style={{marginBottom:32}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
          <Tip def={[lm.label,lm.desc]}><span style={{fontSize:14,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:lm.color}}>{lm.label}</span></Tip>
          <span style={{fontSize:13,color:'var(--text3)'}}>{lm.sub}</span>
          <span style={{flex:1,height:2,background:lm.color+'30'}}/>

          return <div key={s.key} onClick={()=>{const first=items[0];if(first)onSelect(first.id);}}

/* ── OVERVIEW ── */
function Overview({onSelect, role, sample, genStates, genResults, generateStage, valuesLayer, completedOpening, onBeginStage, onRefStage}){
  const byStage={};
  Object.keys(STAGES).forEach(k=>{byStage[k]=[];});
  TOOLS.forEach(t=>{
    if(!byStage[t.stage]) return;
    if(role.id==='all'||rolePerm(t,role.id)!=='-') byStage[t.stage].push(t);
  });

  function stageStatus(key){
    if(sample) return SAMPLE_STAGE_STATUS[key]||'Not Started';
    const st=TOOLS.filter(t=>t.stage===key);
    if(!st.length) return 'Not Started';
    if(st.every(toolIsComplete)) return 'Complete';
    if(st.some(toolHasData)) return 'Active';
    return 'Not Started';
  }
  function toolState(t){
    // Check for pending AI draft
    if(localStorage.getItem('bbos_draft_notes_'+t.id)||localStorage.getItem('bbos_draft_meta_'+t.id)) return 'Draft';
    // Check for user-entered field data
    const hasData=(t.fields&&t.fields.some(f=>localStorage.getItem('bbos_field_'+t.id+'_'+f.key)))||!!localStorage.getItem('bbos_notes_'+t.id);
    if(hasData){
      if(localStorage.getItem('bbos_complete_'+t.id)) return 'Complete';
      return 'In Progress';
    }
    if(!sample) return 'Empty';
    if(DOC[t.id]) return 'Complete';
    if(S.notes[t.id]) return 'In Progress';
    return 'Empty';
  }

  const stages = Object.values(STAGES);

  return <div className="ov">
    <div className="ov-ey">Barakah Business Operating System</div>
    <div className="ov-title">Pipeline Map</div>
    <div className="ov-sub">Every tool in this system maps to a BBOS pipeline stage with a governing attribute. No outreach without research. No research without qualification. No offer without honest valuation.</div>

    {/* PIP STRIP — now with status badges */}
    <div className="pip">
      {stages.map(s=>{
        const cnt=(byStage[s.key]||[]).length;
        if(!cnt) return null;
        const st=stageStatus(s.key);
        const sm=STATUS_META[st];
        return <div key={s.key} className="pip-item" style={{background:s.bg,borderColor:s.b,color:s.c,cursor:'pointer'}} onClick={()=>{if(st==='Complete'&&onRefStage){onRefStage(s.key);return;}const el=document.getElementById('stage-'+s.key);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}}>

          <div className="pip-attr">{getAttr(s)}</div>

            <span style={{fontSize:10,fontWeight:600,color:sm.color,letterSpacing:'.4px'}}>{st}</span>
          </div>
        </div>;
      })}
    </div>

    {/* STAGE BLOCKS — grouped with phase dividers */}
    {(()=>{
      let lastPhase=null;
      let lastLayer=null;
      return stages.map(s=>{
        const items=byStage[s.key]||[];
        if(!items.length) return null;
        const phase=PHASES[s.key];
        const layer=LAYERS[s.key];
        const st=stageStatus(s.key);
        const sm=STATUS_META[st];
        const showLayer = layer!==lastLayer;
        if(showLayer) lastLayer=layer;
        const showDivider = phase!==lastPhase;
        lastPhase=phase;
        const lm=showLayer?LAYER_META[layer]:null;
        return <div key={s.key} id={'stage-'+s.key}>
          {showLayer&&<div className="layer-div">
            <Tip def={[lm.label,lm.desc]}><span className="layer-lbl" style={{color:lm.color}}>{lm.label}</span></Tip>
            <span className="layer-sub">{lm.sub}</span>
            <span className="layer-line" style={{background:lm.color+'40'}}/>

          {showDivider&&<div style={{display:'flex',alignItems:'center',gap:10,margin:'28px 0 16px'}}>
            <span style={{fontSize:11,fontWeight:700,letterSpacing:'1.2px',textTransform:'uppercase',color:'var(--text3)',whiteSpace:'nowrap'}}>{phase}</span>
            <span style={{flex:1,height:1,background:'var(--border)'}}/>

          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12,gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <Tip term={s.key}><span style={{background:s.bg,color:s.c,border:`1px solid ${s.b}`,borderRadius:4,padding:'3px 9px',fontSize:11,fontWeight:700,letterSpacing:'.5px',flexShrink:0,cursor:st==='Complete'?'pointer':'default'}} onClick={()=>{if(st==='Complete'&&onRefStage)onRefStage(s.key);}}>

              <span style={{fontSize:14,color:'var(--text3)',fontStyle:'italic'}}>{getAttr(s)}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>

                <span style={{fontSize:11,color:sm.color}}>{sm.dot}</span>

          {/* Tool cards */}
          <div className="tc-grid" style={{marginBottom:8}}>

                'In Progress': {bg:'var(--warning-bg)',  color:'var(--warning)',   border:'1px solid var(--warning-b)', dot:'◉'},
                'Draft':       {bg:'var(--warning-bg2)', color:'var(--warning)',   border:'1px solid var(--warning-b2)', dot:'⚠'},
                'Empty':       {bg:'var(--bg4)',color:'var(--text3)',border:'1px solid var(--border2)',dot:'○'},

              const stageLocked=valuesLayer==='islamic'&&!completedOpening?.[s.key];
              return <div key={t.id} className={`tc${stageLocked?' tool-locked':''}`} onClick={()=>{
                if(stageLocked){onBeginStage?.(s.key,t.id);return;}
                onSelect(t.id);

                <div className="tc-top">
                  <Tip def={[t.label,t.desc]}><div className="tc-name">{t.label}</div></Tip>
                  {role.id!=='all'&&<PermPill p={rolePerm(t,role.id)} size="sm"/>}

/* ── DRAFT REVIEW ── */
function DraftReview({toolId, tool, onAccept, onReject}){
  const draftNotes=localStorage.getItem('bbos_draft_notes_'+toolId)||'';
  const draftMeta=safeGetJSON('bbos_draft_meta_'+toolId,{});
  const existingNotes=localStorage.getItem('bbos_notes_'+toolId)||'';
  const draftFields={};
  if(tool.fields){
    tool.fields.forEach(f=>{
      const v=localStorage.getItem('bbos_draft_field_'+toolId+'_'+f.key);
      if(v) draftFields[f.key]=v;
    });
  }
  const hasDraft=draftNotes||Object.keys(draftFields).length>0;
  if(!hasDraft) return null;
  const accept=()=>{
    if(!confirm('Accept this AI draft? This will replace your current content.'))return;
    if(draftNotes){safeSet('bbos_notes_'+toolId,draftNotes);safeRemove('bbos_draft_notes_'+toolId);}
    if(tool.fields) tool.fields.forEach(f=>{const v=localStorage.getItem('bbos_draft_field_'+toolId+'_'+f.key);if(v){safeSet('bbos_field_'+toolId+'_'+f.key,v);safeRemove('bbos_draft_field_'+toolId+'_'+f.key);}});
    if(draftMeta.g_label) safeSet('bbos_gl_'+toolId,draftMeta.g_label);
    safeRemove('bbos_draft_meta_'+toolId);
    onAccept&&onAccept();
  };
  const reject=()=>{
    if(!confirm('Reject this draft? The AI-generated content will be permanently discarded.'))return;
    safeRemove('bbos_draft_notes_'+toolId);
    if(tool.fields) tool.fields.forEach(f=>safeRemove('bbos_draft_field_'+toolId+'_'+f.key));
    safeRemove('bbos_draft_meta_'+toolId);
    onReject&&onReject();
  };
  return <div className="draft-banner">
    <div className="draft-label">⚠ AI-Generated Draft Pending Review</div>
    {draftMeta.generated_at&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:8}}>Generated: {new Date(draftMeta.generated_at).toLocaleString()}</div>}
    {draftMeta.g_label&&<div style={{fontSize:12,color:'var(--text3)',marginBottom:8}}>Suggested G-Label: {draftMeta.g_label}</div>}

  const [model,setModel]=useState(()=>localStorage.getItem('bbos_model')||LLM_PROVIDERS[localStorage.getItem('bbos_provider')||'anthropic']?.defaultModel||'');

/* ── export pipeline ── */
function exportPipeline(){
  const data={version:'1.1',exported:new Date().toISOString(),tools:{},thresholds:{}};
  // Capture threshold states
  try{const o=localStorage.getItem('bbos_thr_open');if(o)data.thresholds.opening=JSON.parse(o);}catch(e){}
  try{const c=localStorage.getItem('bbos_thr_close');if(c)data.thresholds.closing=JSON.parse(c);}catch(e){}
  // Capture all tool data — scan localStorage for field keys to catch custom workspace fields
  const fieldPrefix='bbos_field_';
  const allFieldKeys={};
  const _sortedTools=[...TOOLS].sort((a,b)=>b.id.length-a.id.length);
  for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(fieldPrefix)){const rest=k.slice(fieldPrefix.length);const toolId=_sortedTools.find(t=>rest.startsWith(t.id+'_'))?.id;if(toolId){const fk=rest.slice(toolId.length+1);if(!allFieldKeys[toolId])allFieldKeys[toolId]={};allFieldKeys[toolId][fk]=localStorage.getItem(k);}}}
  TOOLS.forEach(t=>{
    const entry={};
    const notes=localStorage.getItem('bbos_notes_'+t.id);
    if(notes) entry.content=notes;
    const gl=localStorage.getItem('bbos_gl_'+t.id);
    if(gl) entry.g_label=gl;
    const gate=localStorage.getItem('bbos_gate_'+t.id);
    if(gate) entry.gate=gate;
    const comp=localStorage.getItem('bbos_complete_'+t.id);
    if(comp) entry.complete=true;
    // Merge fields from TOOLS definition AND any custom workspace fields found in localStorage
    const fields={};
    if(t.fields) t.fields.forEach(f=>{const v=localStorage.getItem('bbos_field_'+t.id+'_'+f.key);if(v)fields[f.key]=v;});
    if(allFieldKeys[t.id]) Object.assign(fields,allFieldKeys[t.id]);
    if(Object.keys(fields).length) entry.fields=fields;
    if(Object.keys(entry).length) data.tools[t.id]=entry;
  });
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='bbos-pipeline-'+new Date().toISOString().slice(0,10)+'.bbos.json';
  a.click();URL.revokeObjectURL(url);showToast('\u2713 Pipeline exported');
}

/* ── safe localStorage wrapper ── */
let _toastTimer=null;
function safeSet(key,val){
  try{localStorage.setItem(key,val);return true;}
  catch(e){
    console.error('localStorage write failed:',key,e);
    const el=document.getElementById('bbos-toast');
    if(el){el.textContent='Storage full or unavailable — changes may not be saved.';el.style.opacity='1';el.style.transform='translateY(0)';clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(12px)';},4000);}
    return false;
  }
}
function safeRemove(key){try{localStorage.removeItem(key);}catch(e){console.warn('localStorage op failed:',e)}}
function safeGetJSON(key,fallback={}){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){console.warn('Corrupt storage key:',key);return fallback;}}
function showSaveToast(){const el=document.getElementById('bbos-toast');if(el){el.textContent='\u2713 Saved';el.style.opacity='1';el.style.transform='translateY(0)';clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(12px)';},2000);}}
function showToast(msg,ms){const el=document.getElementById('bbos-toast');if(el){el.textContent=msg;el.style.opacity='1';el.style.transform='translateY(0)';clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(12px)';},ms||2000);}}
var _fieldDebounce=null;
function dispatchFieldUpdate(){clearTimeout(_fieldDebounce);_fieldDebounce=setTimeout(()=>window.dispatchEvent(new Event('bbos-field-updated')),300);}

function toolHasData(t){
  if(localStorage.getItem('bbos_draft_notes_'+t.id)||localStorage.getItem('bbos_draft_meta_'+t.id))return true;
  if(t.fields&&t.fields.some(f=>localStorage.getItem('bbos_field_'+t.id+'_'+f.key)))return true;
  return !!localStorage.getItem('bbos_notes_'+t.id);
}
function toolIsComplete(t){return toolHasData(t)&&!!localStorage.getItem('bbos_complete_'+t.id);}

      if(!isMounted.current) return;
      const synthesis=synthesizeAssets(result);
      setGenResults(r=>({...r,[stageKey]:synthesis}));
      setGenStates(s=>({...s,[stageKey]:synthesis.error?'error':'complete'}));
    }catch(e){
      if(!isMounted.current) return;
      setGenResults(r=>({...r,[stageKey]:{error:e.message}}));
      setGenStates(s=>({...s,[stageKey]:'error'}));
    }
  };

  const onFileUpload=async(e)=>{
    const file=e.target.files?.[0];
    if(!file) return;
    if(!confirm('Import pipeline data from "'+file.name+'"? This may overwrite existing content.'))return;
    try{
      const text=file.text?await file.text():await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsText(file);});
      const json=JSON.parse(text);
      // Detect export format (v1.0/v1.1) vs AI generation format
      if(json.version&&json.tools){
        // Pipeline restore from export
        let restored=0;
        Object.entries(json.tools).forEach(([toolId,entry])=>{
          if(entry.content) safeSet('bbos_notes_'+toolId,entry.content);
          if(entry.g_label) safeSet('bbos_gl_'+toolId,entry.g_label);
          if(entry.gate) safeSet('bbos_gate_'+toolId,entry.gate);

          if(entry.fields) Object.entries(entry.fields).forEach(([fk,fv])=>safeSet('bbos_field_'+toolId+'_'+fk,fv));
          restored++;
        });
        if(json.thresholds){
          if(json.thresholds.opening) safeSet('bbos_thr_open',JSON.stringify(json.thresholds.opening));
          if(json.thresholds.closing) safeSet('bbos_thr_close',JSON.stringify(json.thresholds.closing));
        }
        alert('Restored '+restored+' tools from pipeline backup.');
        window.dispatchEvent(new Event('bbos-field-updated'));

        // AI generation format — route through synthesizeAssets
        const result=await handleFileUpload(file);

    {apiKeyOpen&&<ApiKeyModal open={apiKeyOpen} onClose={()=>setApiKeyOpen(false)} onSave={()=>{const p=localStorage.getItem('bbos_provider')||'anthropic';setApiKeySet(!!localStorage.getItem('bbos_api_key_'+p));}}/>}

      <div className="tb-divider"/>

      <div className="role-sel-wrap" onMouseEnter={()=>{if(roleMode!=='closed')setRoleHover(true);}} onMouseLeave={()=>setRoleHover(false)}>
        <div ref={roleBtnRef} className="role-sel" style={{maxWidth:roleOpen?700:130,transition:'max-width .3s ease',overflow:'hidden'}}>

              style={active?{background:r.bg,color:r.color}:{}}
              onClick={()=>{if(active){setRoleMode(cycleMode);}else{switchRole(r.id);}}}>{r.id==='all'?'All Roles':r.label}</button>;
            return r.tip?<Tip key={r.id} def={[r.label+' \u2014 '+r.sub,r.tip]}>{btn}</Tip>:btn;

        </div>
        <button aria-label={roleOpen?'Collapse role selector':'Expand role selector'} className={`role-toggle-icon ${roleMode==='open'?'static':roleMode==='closed'?'closed':'flash'}`} onClick={()=>setRoleMode(cycleMode)}>{roleMode==='open'?'\u2039':roleMode==='closed'?'\u2014':'\u203A\u203A'}</button>

          {[['pipeline','Pipeline',view==='pipeline'&&mapView==='pipeline',()=>{switchView('pipeline');switchMapView('pipeline');}],
            ['layers','Layers',view==='pipeline'&&mapView==='layers',()=>{switchView('pipeline');switchMapView('layers');}],
            ['asset','Assets',view==='asset',()=>switchView('asset')]
          ].map(([k,lbl,active,fn])=>
            <button key={k} className={`sg-btn${active?' on':''}`} onClick={()=>{if(active){setViewMode(cycleMode);}else{fn();}}}>{lbl}</button>
          )}
        </div>}
        <div ref={valRef} className="seg" style={{maxWidth:valExp?200:90,transition:'max-width .3s ease',overflow:'hidden'}} onMouseEnter={()=>{if(valMode!=='closed')setValHov(true);}} onMouseLeave={()=>setValHov(false)}>
          {[['islamic','Islamic'],['universal','Universal']].map(([k,lbl])=>{
            const active=valuesLayer===k;
            return <button key={k} className={`sg-btn${active?' on':''}`} onClick={()=>{if(active){setValMode(cycleMode);}else{switchValues(k);}}}>{lbl}</button>;
          })}
        </div>
        {valuesLayer==='islamic'&&<div ref={langRef} className="seg" style={{maxWidth:langExp?200:90,transition:'max-width .3s ease',overflow:'hidden'}} onMouseEnter={()=>{if(langMode!=='closed')setLangHov(true);}} onMouseLeave={()=>setLangHov(false)}>
          {[['en','English'],['ar','\u0627\u0644\u0639\u0631\u0628\u064A\u0629']].map(([k,lbl])=>{
            const active=attrLang===k;
            return <button key={k} className={`sg-btn${active?' on':''}`} onClick={()=>{if(active){setLangMode(cycleMode);}else{switchAttrLang(k);}}}>{lbl}</button>;
          })}
        </div>}
        <div ref={tipRef} className="seg" style={{maxWidth:tipExp?180:80,transition:'max-width .3s ease',overflow:'hidden'}} onMouseEnter={()=>{if(tipMode!=='closed')setTipHov(true);}} onMouseLeave={()=>setTipHov(false)}>
          {[['on','Tips On',tipsOn],['off','Tips Off',!tipsOn]].map(([k,lbl,active])=>
            <button key={k} className={`sg-btn${active?' on':''}`} onClick={()=>{if(active){setTipMode(cycleMode);}else{toggleTips();}}}>{lbl}</button>
          )}
        </div>
        <div ref={themeRef} className="seg" style={{maxWidth:themeExp?170:70,transition:'max-width .3s ease',overflow:'hidden'}} onMouseEnter={()=>{if(themeMode!=='closed')setThemeHov(true);}} onMouseLeave={()=>setThemeHov(false)}>
          {[['dark','Dark',theme==='dark'],['light','Light',theme==='light']].map(([k,lbl,active])=>
            <button key={k} className={`sg-btn${active?' on':''}`} onClick={()=>{if(active){setThemeMode(cycleMode);}else{switchTheme(k);}}}>{lbl}</button>
          )}
        </div>
        {sample&&<span className="tb-badge" style={{background:'var(--out-bg)',color:'var(--out)',border:'1px solid var(--out-b)'}}>The Clarity Practice</span>}
        <button className="sg-btn" onClick={()=>setApiKeyOpen(true)} title={apiKeySet?'API key set':'Set API key'} style={{position:'relative'}}>
          Key{apiKeySet&&<span style={{position:'absolute',top:2,right:2,width:6,height:6,borderRadius:'50%',background:'var(--success)'}}/>}
        </button>
        <div className="tb-divider"/>
        <button className="sg-btn" onClick={exportPipeline} title="Export pipeline to file" aria-label="Export pipeline">Export</button>
        <button className="sg-btn" onClick={()=>fileRef.current&&fileRef.current.click()} title="Import pipeline from file" aria-label="Import pipeline">Import</button>
        {(()=>{try{let n=0;for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('bbos_'))n+=k.length+(localStorage.getItem(k)||'').length;}const kb=Math.round(n/1024);const pct=Math.round(n/5242880*100);return <span className="sg-btn" title={kb+'KB used of ~5MB localStorage quota'} style={{cursor:'default',fontSize:10,opacity:0.6,minWidth:0,padding:'2px 6px',color:pct>80?'var(--warning)':'var(--text3)'}}>{pct}%</span>;}catch(e){return null;}})()}
      </div>
    </div>

    {/* THRESHOLD MODALS */}
    {openingStageKey&&valuesLayer==='islamic'&&<OpeningThreshold
      stageKey={openingStageKey}
      onClose={()=>{setOpeningStageKey(null);setPendingToolId(null);}}
      onComplete={()=>completeOpening(openingStageKey)}
    />}
    {closingStageKey&&valuesLayer==='islamic'&&<ClosingThreshold
      stageKey={closingStageKey}
      onClose={()=>setClosingStageKey(null)}
      onComplete={()=>completeClosing(closingStageKey)}
    />}
    {/* MOBILE BACKDROP */}
    {sbOpen&&<div className="sb-backdrop" onClick={toggleSb}/>}

    {/* NARROW STRIP — mobile only, always visible */}
    <div className="sb-strip">
      <button className="sb-strip-btn" style={{marginBottom:4}} onClick={toggleSb} title="Expand">
        <span style={{fontSize:16,color:'var(--accent)'}}>☰</span>
      </button>
      {stages.map(s=>{
        const cnt=(toolsByStage[s.key]||[]).length;
        if(!cnt) return null;
        return <button key={s.key} className={`sb-strip-btn${collapsed[s.key]===false?' active':''}`}
          onClick={()=>{toggleSb();}}
          title={`${s.code} — ${s.name}`}
          style={{}}>
          <span className="sb-strip-dot" style={{background:s.c}}/>
          <span className="sb-strip-code" style={{color:s.c}}>{s.code}</span>
        </button>;
      })}
    </div>

    {/* SIDEBAR COLUMN — Islamic Layer + Pipeline tabs */}
    <div className={`sb sb-full${refStageKey?' ref-mode-blur':''}`} ref={sbScrollRef}
      onMouseEnter={()=>{clearTimeout(sbHovTimer.current);setSbPanelHov(true);}}
      onMouseLeave={()=>{sbHovTimer.current=setTimeout(()=>setSbPanelHov(false),120);}}
      style={{overflowX:'hidden',overflowY:'auto',position:'relative'}}
    >
      {/* Collapsed stages strip — shown when sidebar is collapsed */}
      {!sbPanelOpen && <div className="sb-vstrip">
        <button
          className={`vstrip-icon-btn${!sbPanelLocked?' flash-btn':''}`}
          onClick={()=>setSbPanelLocked(o=>!o)}
          title="Stages — hover to expand, click to lock open"
        >
          <span style={{fontSize:15,color:'var(--accent)'}}>≡</span>
        </button>
        <div className="vstrip-divider"/>
        {stages.map(s=>{
          const cnt=(toolsByStage[s.key]||[]).length;
          if(!cnt) return null;
          return <div key={s.key} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:1,padding:'3px 0'}}>
            <div className="vstrip-dot" style={{background:s.c}} title={s.key+' — '+s.name}/>
            <span className="vstrip-code" style={{color:s.c}}>{s.key.slice(0,3)}</span>
          </div>;
        })}
      </div>}

      {/* ── Expanded content: tabs + selected panel ── */}
      {sbPanelOpen && <>
      {/* Mobile: stacked tabs */}
      {isMobile&&valuesLayer==='islamic'&&<button
        className={`mob-il-tab${mobTab==='islamic'?' on':''}`}
        onClick={()=>setMobTab(mobTab==='islamic'?'pipeline':'islamic')}
      >
        <span className="mob-tab-glyph">⧁</span>
        Islamic Layer
        <span className="mob-tab-chevron">{mobTab==='islamic'?'▾':'▸'}</span>
      </button>}

      {isMobile&&mobTab==='islamic'&&valuesLayer==='islamic'&&<IslamicLayerColumn
        focusedStageKey={focusedStageKey}
        valuesLayer={valuesLayer}
        onDragStart={()=>{}}
        isOpen={true}
        isLocked={true}
        onToggleLock={()=>{}}
        onHoverChange={()=>{}}
      />}

      {isMobile&&<button
        className={`mob-pipe-tab${mobTab==='pipeline'?' on':''} ${mobTab==='islamic'?'islamic-mode':'pipeline-mode'}`}
        onClick={()=>setMobTab('pipeline')}
      >
        <span className="mob-tab-glyph">≡</span>
        Pipeline
        <span className="mob-tab-chevron">{mobTab==='pipeline'?'▾':'▸'}</span>
      </button>}

      {/* Pipeline content — always on desktop, tab-gated on mobile */}
      {(!isMobile||mobTab==='pipeline') && <>
      {roleId!=='all'&&<div className="role-banner">
        <div className="role-avatar" style={{background:role.bg,color:role.color}}>{role.initials}</div>
        <div className="role-banner-info">
          <div className="role-banner-name">{role.label}</div>
          <div className="role-banner-sub">{sidebarTools.length} tools in scope</div>
        </div>
      </div>}
      <div className={`sb-top${sbScrolled?' scrolled':''}`} ref={sbTopRef} style={{top:(isMobile&&valuesLayer==='islamic')?76:isMobile?38:0}}>
        <div style={{display:'flex',alignItems:'center',gap:4}}>
          <button className={`sb-overview${!selId?' on':''}`} onClick={()=>setSelId(null)} style={{flex:1}}>
            <svg viewBox="0 0 14 14" fill="currentColor"><rect x="1" y="1" width="5" height="5" rx="1"/><rect x="8" y="1" width="5" height="5" rx="1"/><rect x="1" y="8" width="5" height="5" rx="1"/><rect x="8" y="8" width="5" height="5" rx="1"/></svg>
            {roleId!=='all'?role.label+' Dashboard':view==='asset'?'All Assets':'Pipeline Overview'}
          </button>
        </div>
        <input value={sbSearch} onChange={e=>setSbSearch(e.target.value)} placeholder="Search tools..." aria-label="Search tools" style={{width:'100%',marginTop:6,padding:'5px 9px',fontSize:13,background:'var(--bg3)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontFamily:'inherit',outline:'none'}}/>
      </div>
      {Object.values(STAGES).map(s=>{
        const items=toolsByStage[s.key]||[];
        if(!items.length) return null;
        const open=!collapsed[s.key];
        return <div key={s.key} className="sb-sec">
          <div className="sb-sec-hdr" style={{borderLeft:`2px solid ${s.c}40`,position:'sticky',top:sbTopH,zIndex:4,background:'var(--bg2)'}}>
            <div style={{flex:1,cursor:'pointer'}} onClick={()=>toggleCol(s.key)}>
              <div className="sb-sec-code" style={{color:s.c}}><Tip term={s.key}>{s.key} — {s.name}</Tip></div>
              <div className="sb-sec-attr">{getAttr(s)}</div>
            </div>
            <div className="sb-sec-right">
              {valuesLayer==='islamic'&&(completedOpening[s.key]
                ? (completedClosing[s.key]
                    ? <span className="stg-thr-btn stg-closed" title="Stage closed">✓ Closed</span>
                    : <button className="stg-thr-btn stg-close" onClick={e=>{e.stopPropagation();setClosingStageKey(s.key);}} title="Close this stage">Close Stage</button>
                  )
                : <button className="stg-thr-btn stg-begin" onClick={e=>{e.stopPropagation();beginStage(s.key);}} title="Open this stage with its spiritual threshold">Begin Stage</button>
              )}
              {(()=>{const done=items.filter(t=>getToolState(t)==='Complete').length;return <span className="sb-cnt" style={{background:done===items.length&&done>0?'var(--success-bg)':s.bg,color:done===items.length&&done>0?'var(--success)':s.c,border:`1px solid ${done===items.length&&done>0?'var(--success-b)':s.b}`}}>{done>0?done+'/':''}{items.length}</span>;})()}
              <span className={`sb-chev ${open?'open':'closed'}`} style={{cursor:'pointer'}} onClick={()=>toggleCol(s.key)}>▾</span>
            </div>
          </div>
          {open&&<>
            {items.map(t=>{
              const p=roleId==='all'?'O':rolePerm(t,roleId);
              const hasDraft=!!(localStorage.getItem('bbos_draft_notes_'+t.id)||localStorage.getItem('bbos_draft_meta_'+t.id));
              const ts=getToolState(t);
              const isToolLocked=ts==='Empty'&&t.sources&&t.sources.length>0&&t.sources.some(src=>{const srcT=TOOLS.find(x=>x.id===src.tool);return srcT&&getToolState(srcT)!=='Complete';});
              const showDeps=depExpanded===t.id&&isToolLocked;
              return <div key={t.id}>
              <div
                className={`sb-item${selId===t.id?' on':''}${valuesLayer==='islamic'&&!completedOpening[s.key]?' tool-locked':''}`}
                title={valuesLayer==='islamic'&&!completedOpening[s.key]?'Complete the Opening Threshold to unlock this stage':isToolLocked?'Click to see dependencies':undefined}
                onClick={()=>{
                  if(valuesLayer==='islamic'&&!completedOpening[s.key]){beginStage(s.key,t.id);return;}
                  if(isToolLocked){setDepExpanded(depExpanded===t.id?null:t.id);return;}
                  setSelId(t.id);
                }}>
                <div className="sb-item-dot" style={{background:hasDraft?'var(--warning)':s.c+'90'}}/>
                <div className="sb-item-body">
                  <Tip def={[t.label, t.desc]}><div className="sb-item-label">{t.label}</div></Tip>
                  <div className="sb-item-sub" style={{display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}>
                    <StatusPill status={ts}/>
                    {roleId!=='all'&&<PermPill p={p} size="sm"/>}
                  </div>
                </div>
              </div>
              {showDeps&&<div className="dep-disclosure" style={{margin:'0 14px 6px',fontSize:9}}>
                <div style={{letterSpacing:'.7px',textTransform:'uppercase',color:'var(--text3)',marginBottom:5}}>Missing dependencies</div>
                {t.sources.map((src,si)=>{const srcT=TOOLS.find(x=>x.id===src.tool);const srcState=srcT?getToolState(srcT):'Empty';return <div key={si} className="dep-item">{srcState==='Complete'?<span style={{color:'var(--success)'}}>✓</span>:<span style={{color:'var(--text3)'}}>○</span>}<span>{src.label}</span></div>;})}
                <div style={{fontSize:10,color:'var(--text3)',marginTop:5,lineHeight:1.5}}>Unlocks when all dependencies are complete.</div>
              </div>}
              </div>;
            })}
          </>}
        </div>;
      })}
      {sbSearch&&!Object.values(toolsByStage).some(a=>a.length)&&<div style={{padding:'20px 14px',textAlign:'center',color:'var(--text3)',fontSize:13}}>No tools matching "{sbSearch}"</div>}
      <div className="sb-drag" onMouseDown={onDragStart}/>
      </>}
      </>}
    </div>

    {/* Bottom scroll indicator — fixed outside scroll container */}
    {sbPanelOpen&&<div className={`sb-bottom-fade${sbScrollEnd?' active':''}`} style={{width:isMobile?280:sbWidth}}/>}

    {/* Sidebar edge toggle — click to collapse/expand, drag to resize */}
    <div className="sb-edge-toggle" style={{cursor:sbPanelOpen&&!isMobile?'col-resize':'pointer'}}
      onMouseDown={e=>{
        if(isMobile||!sbPanelOpen) return;
        const startX=e.clientX;const startW=sbWidth;
        dragRef.current={active:true,startX,startW,dragged:false};
        const onMove=e2=>{
          if(Math.abs(e2.clientX-startX)>4) dragRef.current.dragged=true;
          if(dragRef.current.dragged){e.preventDefault();const w=Math.min(480,Math.max(160,startW+(e2.clientX-startX)));setSbWidth(w);safeSet('bbos_sb_width',String(w));}
        };
        const onUp=()=>{
          document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);
          dragRef.current.active=false;
        };
        document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
      }}
      onClick={()=>{
        if(dragRef.current?.dragged){dragRef.current.dragged=false;return;}
        if(isMobile) toggleSb();
        else setSbPanelLocked(o=>!o);
      }}
      title={sbPanelOpen?'Drag to resize · Click to collapse':'Click to expand'} aria-label="Toggle sidebar"
    />

    <input ref={fileRef} type="file" accept=".json,.bbos.json" style={{display:'none'}} onChange={onFileUpload}/>

    {/* ISLAMIC LAYER COLUMN — desktop only, grid col 3 */}
    {!isMobile&&valuesLayer==='islamic'&&<div className="il il-desktop" style={{gridRow:2,gridColumn:3,overflowY:'auto',overflowX:'hidden'}}
      onMouseEnter={()=>{clearTimeout(ilHovTimer.current);setIlHov(true);}}
      onMouseLeave={()=>{ilHovTimer.current=setTimeout(()=>setIlHov(false),120);}}
    >
      <IslamicLayerColumn
        focusedStageKey={focusedStageKey}
        valuesLayer={valuesLayer}
        onDragStart={()=>{}}
        isOpen={ilOpen}
        isLocked={ilLocked}
        onToggleLock={()=>setIlLocked(o=>!o)}
        onHoverChange={()=>{}}
      />
    </div>}

    {/* IL EDGE TOGGLE — desktop only, grid col 4 */}
    {!isMobile&&valuesLayer==='islamic'&&<div className="il-edge-toggle"
      style={{cursor:ilOpen?'col-resize':'pointer'}}
      onMouseDown={e=>{
        if(!ilOpen) return;
        const startX=e.clientX;const startW=ilWidth;
        ilDragRef.current={active:true,startX,startW,dragged:false};
        const onMove=e2=>{
          if(Math.abs(e2.clientX-startX)>4) ilDragRef.current.dragged=true;
          if(ilDragRef.current.dragged){e.preventDefault();const w=Math.min(360,Math.max(160,startW+(e2.clientX-startX)));setIlWidth(w);safeSet('bbos_il_width',String(w));}
        };
        const onUp=()=>{document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);ilDragRef.current.active=false;};
        document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
      }}
      onClick={()=>{
        if(ilDragRef.current?.dragged){ilDragRef.current.dragged=false;return;}
        setIlLocked(o=>!o);
      }}
      title={ilOpen?'Drag to resize · Click to collapse':'Click to expand Islamic Layer'} aria-label="Toggle Islamic Layer"
    />}

    {/* MAIN */}
    <div className="main" onClick={sbOpen?toggleSb:undefined}>{mainContent()}</div>
    {pilOpen&&<PILModal onClose={()=>setPilOpen(false)} completedStages={completedStageKeys}/>}
    <div id="bbos-toast" style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%) translateY(12px)',background:'var(--danger)',color:'var(--on-accent)',padding:'10px 20px',borderRadius:8,fontSize:14,fontWeight:500,opacity:0,transition:'opacity .3s,transform .3s',zIndex:100000,pointerEvents:'none',whiteSpace:'nowrap'}}/>
  </div>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(e){return{hasError:true,error:e};}
  componentDidCatch(e,info){console.error('BBOS Error Boundary caught:',e,info);}
  render(){if(this.state.hasError)return React.createElement('div',{style:{padding:40,textAlign:'center',color:'#e8e3dc',fontFamily:'DM Sans,sans-serif'}},
    React.createElement('h2',null,'Something went wrong'),
    React.createElement('p',{style:{color:'#9e9690',marginTop:12}},this.state.error?.message||'An unexpected error occurred.'),
    React.createElement('button',{onClick:()=>this.setState({hasError:false,error:null}),style:{marginTop:20,padding:'10px 24px',background:'#c9a05a',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontSize:14}},'Reload App'));return this.props.children;}
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
